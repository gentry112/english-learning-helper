<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>英语学习助手</title>

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'wechat-green': '#95EC69',
            'cet-orange': '#FF6B35',
            'bg-gray': '#F5F5F5',
            'text-dark': '#333333',
            'border-light': '#E5E5E5',
          }
        }
      }
    }
  </script>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #EDEDED; }

    /* 聊天区域滚动 */
    .chat-area { -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }

    /* 加载三点动画 */
    @keyframes dotBlink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
    .dot-1, .dot-2, .dot-3 { animation: dotBlink 1.4s infinite both; }
    .dot-2 { animation-delay: 0.2s; }
    .dot-3 { animation-delay: 0.4s; }

    /* 输入框抖动 */
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    .shake { animation: shake 0.3s ease-in-out; }

    /* Toast 动画 */
    .toast-enter-active { animation: toastIn 0.3s ease-out; }
    .toast-leave-active { animation: toastOut 0.3s ease-in; }
    @keyframes toastIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes toastOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-100%); opacity: 0; } }

    /* 弹窗入场 */
    @keyframes modalIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
    .modal-enter { animation: modalIn 0.2s ease-out; }

    /* 消息入场 */
    @keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .msg-enter { animation: msgIn 0.25s ease-out; }

    /* 自定义滚动条 */
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: #D0D0D0; border-radius: 2px; }

    /* 长按选中禁用 */
    .no-select { -webkit-user-select: none; user-select: none; }

    /* 多 Tab 适配小屏 */
    .tab-btn { white-space: nowrap; }
  </style>
</head>
<body class="flex justify-center items-start min-h-[100dvh] bg-[#EDEDED]">

  <div id="app" class="w-full max-w-[480px] h-[100dvh] flex flex-col bg-white relative overflow-hidden shadow-lg">

    <!-- ==================== 欢迎弹窗（首次未设置 API） ==================== -->
    <template v-if="state.showWelcomeModal">
      <div class="fixed inset-0 z-[60] bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-[340px] shadow-xl modal-enter overflow-hidden">
          <div class="px-5 py-4">
            <div class="text-center mb-3">
              <div class="text-3xl mb-2">🎓</div>
              <div class="font-semibold text-text-dark text-base">欢迎使用英语学习助手</div>
              <div class="text-xs text-gray-400 mt-1">面向 CET-6 和考研英语一的 AI 学习工具</div>
            </div>
            <div class="bg-gray-50 rounded-xl px-3.5 py-3 text-xs leading-relaxed space-y-2 mb-4">
              <div class="flex items-start gap-2">
                <span class="flex-shrink-0 mt-0.5">📚</span>
                <span><span class="font-medium text-text-dark">六级 & 考研</span><span class="text-gray-500"> — 顶部栏一键切换，数据完全隔离</span></span>
              </div>
              <div class="flex items-start gap-2">
                <span class="flex-shrink-0 mt-0.5">📖</span>
                <span><span class="font-medium text-text-dark">词汇查询</span><span class="text-gray-500"> — 释义 / 频率 / 例句 / 辨析 / 高级替换</span></span>
              </div>
              <div class="flex items-start gap-2">
                <span class="flex-shrink-0 mt-0.5">🈂️</span>
                <span><span class="font-medium text-text-dark">翻译训练</span><span class="text-gray-500"> — 中译英 & 英译中，交互批改 + 段落精读</span></span>
              </div>
              <div class="flex items-start gap-2">
                <span class="flex-shrink-0 mt-0.5">📝</span>
                <span><span class="font-medium text-text-dark">作文辅助</span><span class="text-gray-500"> — 题目分析 → 批改 / 双版模板，考研支持 🖼️ 拍照识图</span></span>
              </div>
              <div class="flex items-start gap-2">
                <span class="flex-shrink-0 mt-0.5">📂</span>
                <span><span class="font-medium text-text-dark">文件夹管理</span><span class="text-gray-500"> — 按真题篇目分类存放记录</span></span>
              </div>
            </div>
            <div class="bg-blue-50 rounded-lg px-3 py-2 text-xs text-gray-600 mb-4">
              🔧 基于 <span class="font-medium">DeepSeek API</span> + <span class="font-medium">通义千问 VL</span> 视觉识别
            </div>
            <div class="flex gap-2.5">
              <button @click="openSettingsFromWelcome()" class="flex-1 bg-wechat-green text-text-dark text-sm font-medium rounded-lg py-2.5 hover:opacity-80 transition-opacity">⚙️ 去设置 API Key</button>
              <button @click="state.showWelcomeModal = false" class="flex-1 border border-gray-200 text-gray-500 text-sm rounded-lg py-2.5 hover:bg-gray-50 transition-colors">稍后再说</button>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- ==================== Toast 提示 ==================== -->
    <transition name="toast">
      <div v-if="state.toast.show" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] px-5 py-2.5 rounded-lg shadow-md text-sm font-medium no-select" :class="state.toast.type === 'success' ? 'bg-green-500 text-white' : state.toast.type === 'error' ? 'bg-red-500 text-white' : 'bg-gray-800 text-white'">
        {{ state.toast.message }}
      </div>
    </transition>

    <!-- ==================== 考试类型切换栏（颜色随考试类型变化） ==================== -->
    <div :class="['flex-shrink-0 flex items-center px-2 py-1 gap-1.5 z-20 transition-all duration-300', state.examType === 'cet6' ? 'bg-gradient-to-r from-green-500 to-emerald-500' : 'bg-gradient-to-r from-blue-500 to-indigo-500']">
      <button @click="switchExamType('cet6')"
        :class="['flex-1 text-xs py-1.5 rounded-full font-medium transition-all', state.examType === 'cet6' ? 'bg-white text-green-600 shadow-sm' : 'text-white/80 hover:text-white hover:bg-white/10']">
        📚 六级
      </button>
      <button @click="switchExamType('postgrad')"
        :class="['flex-1 text-xs py-1.5 rounded-full font-medium transition-all', state.examType === 'postgrad' ? 'bg-white text-indigo-600 shadow-sm' : 'text-white/80 hover:text-white hover:bg-white/10']">
        📖 考研
      </button>
    </div>

    <!-- ==================== 对话主视图 ==================== -->
    <template v-if="state.currentView === 'chat'">
      <!-- 顶部导航栏 -->
      <div class="flex-shrink-0 h-11 bg-white border-b border-border-light flex items-center justify-between px-3 z-10">
        <div class="relative">
          <button @click.stop="toggleFolderDropdown()" class="flex items-center gap-1 text-sm font-medium text-text-dark hover:opacity-70 transition-opacity px-1 py-1">
            <span>📂</span>
            <span class="max-w-[140px] truncate">{{ currentFolder ? currentFolder.name : '' }}</span>
            <span class="text-xs text-gray-400">▼</span>
          </button>
        </div>
        <div class="flex items-center gap-3">
          <button @click="confirmResetChat()" class="text-lg hover:opacity-70 transition-opacity" title="刷新界面">🔄</button>
          <button @click="openSummary()" class="text-lg hover:opacity-70 transition-opacity" title="历史记录">📊</button>
          <button @click="state.showSettings = true" class="text-lg hover:opacity-70 transition-opacity" title="设置">⚙️</button>
        </div>
      </div>

      <!-- 模式切换 Tab — 从考试类型配置动态生成，同组只显示一个按钮 -->
      <div class="flex-shrink-0 bg-white border-b border-border-light flex items-center px-2 py-1.5 gap-1 z-10">
        <button v-for="modeKey in visibleModeKeys" :key="modeKey"
          @click="switchGroupedMode(modeKey)"
          :class="['flex-1 tab-btn text-xs py-1.5 rounded-full font-medium transition-all', isModeActive(modeKey) ? 'bg-wechat-green text-text-dark shadow-sm' : 'text-gray-500 hover:bg-gray-100']">
          {{ modeDisplayLabel(modeKey) }}
        </button>
      </div>

      <!-- 作文子模式切换胶囊（仅考研作文合并栏显示） -->
      <div v-if="isEssayGroupActive"
        class="flex-shrink-0 bg-white px-2 py-1 border-b border-border-light flex items-center gap-1">
        <button @click="switchEssaySubMode('short')"
          :class="['flex-1 text-xs py-1.5 rounded-full font-medium transition-all',
            state.essaySubMode === 'short'
              ? 'bg-green-100 text-green-700 shadow-sm'
              : 'text-gray-400 hover:text-gray-600 hover:bg-gray-100']">
          ✉️ 小作文
        </button>
        <button @click="switchEssaySubMode('long')"
          :class="['flex-1 text-xs py-1.5 rounded-full font-medium transition-all',
            state.essaySubMode === 'long'
              ? 'bg-indigo-100 text-indigo-700 shadow-sm'
              : 'text-gray-400 hover:text-gray-600 hover:bg-gray-100']">
          📝 大作文
        </button>
      </div>

      <!-- 聊天消息区域 -->
      <div class="flex-1 overflow-y-auto chat-area px-3 py-3 bg-[#F5F5F5]" ref="chatArea">
        <!-- 空状态：无文件夹且无消息 -->
        <div v-if="currentModeMessages.length === 0" class="flex flex-col items-center justify-center h-full text-gray-400">
          <div class="text-5xl mb-4">📚</div>
          <div class="text-sm">{{ examConfig.emptyHint[state.currentMode] || '暂无消息' }}</div>
        </div>

        <!-- 消息列表 -->
        <div v-for="msg in currentModeMessages" :key="msg.id" class="mb-3 msg-enter">
          <!-- 时间标签 -->
          <div v-if="msg.showTime" class="text-center text-xs text-gray-400 mb-2">{{ formatTime(msg.time) }}</div>

          <!-- 欢迎消息 / 系统消息 -->
          <div v-if="msg.type === 'welcome'" class="flex justify-start">
            <div class="max-w-[85%] bg-white border border-border-light rounded-xl px-3.5 py-2.5 text-sm text-text-dark leading-relaxed shadow-sm">
              <div v-html="msg.content"></div>
            </div>
          </div>

          <!-- 用户消息气泡（右侧绿色） -->
          <div v-if="msg.type === 'query'" class="flex justify-end">
            <div class="max-w-[80%] bg-wechat-green rounded-xl px-3.5 py-2.5 text-sm text-text-dark leading-relaxed shadow-sm">
              {{ msg.content }}
            </div>
          </div>

          <!-- 加载动画 -->
          <div v-if="msg.type === 'loading'" class="flex justify-start">
            <div class="bg-white border border-border-light rounded-xl px-4 py-2.5 text-sm text-gray-500 shadow-sm flex items-center gap-1">
              <span>⏳ 正在查询</span>
              <span class="dot-1">.</span><span class="dot-2">.</span><span class="dot-3">.</span>
            </div>
          </div>

          <!-- AI 结果气泡（左侧白色卡片） -->
          <div v-if="msg.type === 'result'" class="flex justify-start">
            <div class="max-w-[90%] bg-white border border-border-light rounded-xl px-3.5 py-3 text-sm text-text-dark leading-relaxed shadow-sm">
              <!-- 📝 拼写检查（仅拼写有误时显示） -->
              <div v-if="msg.content.spellCheck && !msg.content.spellCheck.isCorrect" class="pb-2.5 border-b border-gray-100">
                <div class="font-semibold text-text-dark mb-1">📝 拼写检查</div>
                <div class="text-cet-orange">
                  ⚠️ {{ msg.content.spellCheck?.note || '可能拼写有误' }}
                  <span v-if="msg.content.spellCheck?.correction" class="font-medium">，建议改为：{{ msg.content.spellCheck.correction }}</span>
                </div>
              </div>

              <!-- 📖 释义 -->
              <div class="py-2.5 border-b border-gray-100">
                <div class="font-semibold text-text-dark mb-1">📖 释义</div>
                <div v-if="msg.content.definition" class="text-gray-700">
                  <!-- 整体释义（仅短语/句子时显示：先英文原文，再中文释义） -->
                  <div v-if="msg.content.definition.overall" class="mb-2 bg-yellow-50 rounded-lg px-3 py-2 text-sm">
                    <div class="font-medium text-text-dark mb-1">{{ msg.queryText }}</div>
                    <div class="text-gray-600">{{ msg.content.definition.overall }}</div>
                  </div>
                  <!-- 逐词拆解 -->
                  <div v-if="msg.content.definition.words && msg.content.definition.words.length > 0">
                    <div v-for="(w, wi) in msg.content.definition.words" :key="wi" class="mb-2 last:mb-0">
                      <div class="font-medium text-text-dark mb-0.5">
                        {{ w.word }}
                        <span v-if="w.rootForm && w.rootForm !== w.word" class="text-gray-400 font-normal">({{ w.rootForm }})</span>
                        <span v-if="w.inflection" class="text-gray-400 font-normal text-xs ml-1">· {{ w.inflection }}</span>
                      </div>
                      <!-- 词性+释义，每词性一行 -->
                      <div v-if="w.meanings && w.meanings.length > 0">
                        <div v-for="(m, mi) in w.meanings" :key="mi" class="text-gray-600 text-xs ml-2">
                          <span class="text-gray-400">{{ m.pos }}</span> {{ m.meaning }}
                        </div>
                      </div>
                      <!-- 兼容旧格式 -->
                      <div v-else-if="w.pos" class="text-gray-600 text-xs ml-2">
                        <span class="text-gray-400">{{ w.pos }}</span> {{ w.meaning }}
                      </div>
                      <!-- 派生词 -->
                      <div v-if="w.derivatives && w.derivatives.length > 0" class="text-gray-400 text-xs ml-2 mt-0.5">
                        派生：
                        <span v-for="(d, di) in w.derivatives" :key="di">
                          <span v-if="di > 0">、</span>
                          {{ d.word }} <span v-if="d.pos">({{ d.pos }})</span> <span v-if="d.meaning">{{ d.meaning }}</span>
                        </span>
                      </div>
                    </div>
                  </div>
                  <div v-else class="text-gray-400 text-xs">暂无拆解数据</div>
                </div>
                <div v-else class="text-gray-400 text-xs">暂无释义数据</div>
              </div>

              <!-- 📊 频率 -->
              <div class="py-2.5 border-b border-gray-100">
                <div class="font-semibold text-text-dark mb-1">📊 频率</div>
                <div v-if="msg.content.cetFrequency">
                  <span class="font-medium">
                    <span v-if="msg.content.cetFrequency.level === '高频'">🔴 {{ examConfig.frequencyLabel }}高频</span>
                    <span v-else-if="msg.content.cetFrequency.level === '中频'">🟡 {{ examConfig.frequencyLabel }}中频</span>
                    <span v-else>🟢 {{ examConfig.frequencyLabel }}低频</span>
                  </span>
                  <div v-if="msg.content.cetFrequency.detail" class="text-gray-500 text-xs mt-0.5">{{ msg.content.cetFrequency.detail }}</div>
                </div>
                <div v-else class="text-gray-400 text-xs">暂无频率数据</div>
              </div>

              <!-- 📝 学习记录 -->
              <div class="py-1.5 border-b border-gray-100 text-xs text-gray-400">
                {{ msg.content.historyNote || '📝 首次查询' }}
              </div>

              <!-- 📚 拓展 -->
              <div class="pt-2.5">
                <div class="font-semibold text-text-dark mb-1">📚 拓展</div>
                <div v-if="hasExtensionContent(msg)">
                  <!-- 常考搭配 -->
                  <div v-if="msg.content.extension?.collocations && msg.content.extension.collocations.length > 0" class="mb-2">
                    <div class="text-xs text-gray-400 mb-0.5">常考搭配：</div>
                    <div v-for="(c, ci) in msg.content.extension.collocations" :key="'col_'+ci" class="text-gray-700 text-xs ml-2 mb-0.5">
                      • {{ c.en }} <span class="text-gray-400">{{ c.zh }}</span>
                    </div>
                  </div>
                  <!-- 真题例句 -->
                  <div v-if="msg.content.extension?.exampleSentence" class="mb-2 bg-gray-50 rounded-lg px-3 py-2">
                    <div class="text-xs text-gray-400 mb-0.5">真题例句：</div>
                    <div class="text-gray-700 text-sm italic">{{ msg.content.extension.exampleSentence.en }}</div>
                    <div class="text-gray-500 text-xs mt-0.5">{{ msg.content.extension.exampleSentence.zh }}</div>
                  </div>
                  <!-- 近义词 -->
                  <div v-if="msg.content.extension?.synonyms && msg.content.extension.synonyms.length > 0" class="mb-2">
                    <div class="text-xs text-gray-400 mb-0.5">近义词辨析：</div>
                    <div v-for="(s, si) in msg.content.extension.synonyms" :key="'syn_'+si" class="text-gray-700 text-xs ml-2 mb-0.5">
                      • {{ s.word }} <span class="text-gray-400">({{ s.pos }})</span> {{ s.difference }}
                    </div>
                  </div>
                  <!-- 高级替换 -->
                  <div v-if="msg.content.extension?.advancedAlternatives && msg.content.extension.advancedAlternatives.length > 0">
                    <div class="text-xs text-gray-400 mb-0.5">写作高级表达：</div>
                    <div v-for="(a, ai) in msg.content.extension.advancedAlternatives" :key="'alt_'+ai" class="text-gray-700 text-xs ml-2 mb-0.5">
                      ✨ {{ a.word }} <span class="text-gray-400">({{ a.pos }})</span> {{ a.meaning }}
                    </div>
                  </div>
                </div>
                <div v-else class="text-gray-400 text-xs">暂无扩展数据</div>
              </div>
            </div>
          </div>

          <!-- 错误消息 -->
          <div v-if="msg.type === 'error'" class="flex justify-start">
            <div class="max-w-[85%] bg-red-50 border border-red-200 rounded-xl px-3.5 py-2.5 text-sm text-red-600 leading-relaxed shadow-sm">
              {{ msg.content }}
            </div>
          </div>

          <!-- 🈂️ 中译英结果气泡 -->
          <!-- 🈂️ 翻译结果气泡（中译英 / 英译中 共用模板） -->
          <!-- 🈂️ 翻译示例结果（逐句对照：原文 → 简单版 → 进阶版） -->
          <div v-if="msg.type === 'translate-result' || msg.type === 'en-to-cn-result'" class="flex justify-start">
            <div class="max-w-[95%] bg-white border border-border-light rounded-xl px-3.5 py-3 text-sm text-text-dark leading-relaxed shadow-sm">
              <!-- 新格式：translationPairs 逐句对照 -->
              <template v-if="msg.content.translationPairs && msg.content.translationPairs.length > 0">
                <div v-for="(pair, pi) in msg.content.translationPairs" :key="'tp_'+pi" class="mb-3 last:mb-0">
                  <!-- 原文句子 -->
                  <div class="bg-yellow-50 rounded-lg px-3 py-2 mb-2 text-sm font-medium text-text-dark">
                    {{ pair.original }}
                  </div>
                  <!-- 简单版（兼容数组 basicVersions 和单对象 basic） -->
                  <template v-if="pair.basicVersions && pair.basicVersions.length > 0">
                    <div v-for="(bv, bvi) in pair.basicVersions" :key="'bv_'+pi+'_'+bvi" class="bg-green-50 rounded-lg px-3 py-2 mb-1.5">
                      <div class="flex items-center gap-1 mb-0.5">
                        <span class="text-xs text-green-600 font-medium">📗 简单拿分{{ pair.basicVersions.length > 1 ? ' '+(bvi+1) : '' }}</span>
                        <span v-if="bv.score" class="text-xs text-gray-400">· 🏆 {{ bv.score }}</span>
                      </div>
                      <div class="text-text-dark text-xs leading-relaxed">{{ bv.text }}</div>
                      <div v-if="bv.tips" class="text-gray-400 text-xs mt-0.5">{{ bv.tips }}</div>
                    </div>
                  </template>
                  <template v-else-if="pair.basic">
                    <div class="bg-green-50 rounded-lg px-3 py-2 mb-1.5">
                      <div class="flex items-center gap-1 mb-0.5">
                        <span class="text-xs text-green-600 font-medium">📗 简单拿分</span>
                        <span v-if="pair.basic.score" class="text-xs text-gray-400">· 🏆 {{ pair.basic.score }}</span>
                      </div>
                      <div class="text-text-dark text-xs leading-relaxed">{{ pair.basic.text }}</div>
                      <div v-if="pair.basic.tips" class="text-gray-400 text-xs mt-0.5">{{ pair.basic.tips }}</div>
                    </div>
                  </template>
                  <!-- 进阶版（兼容数组 advancedVersions 和单对象 advanced） -->
                  <template v-if="pair.advancedVersions && pair.advancedVersions.length > 0">
                    <div v-for="(av, avi) in pair.advancedVersions" :key="'av_'+pi+'_'+avi" class="bg-blue-50 rounded-lg px-3 py-2 mb-1.5 last:mb-0">
                      <div class="flex items-center gap-1 mb-0.5">
                        <span class="text-xs text-blue-500 font-medium">📘 进阶高分{{ pair.advancedVersions.length > 1 ? ' '+(avi+1) : '' }}</span>
                      </div>
                      <div class="text-text-dark text-xs leading-relaxed">{{ av.text }}</div>
                      <div v-if="av.highlights && av.highlights.length > 0" class="mt-1">
                        <div class="text-xs text-gray-400 mb-0.5">✨ 亮点：</div>
                        <div v-for="(h, hi) in av.highlights" :key="'hl_'+pi+'_'+avi+'_'+hi" class="text-xs text-gray-600 ml-2">• {{ h }}</div>
                      </div>
                      <div v-if="av.knowledgePoints && av.knowledgePoints.length > 0" class="mt-1">
                        <div class="text-xs text-gray-400 mb-0.5">📚 知识点：</div>
                        <div v-for="(k, ki) in av.knowledgePoints" :key="'kp_'+pi+'_'+avi+'_'+ki" class="text-xs text-gray-600 ml-2">• {{ k }}</div>
                      </div>

        // ==================== 数据持久化 ====================
        function loadFolders() {
          const key = examConfig.value.storageKey;

            const raw = localStorage.getItem(key);

              state.currentFolderId = data.currentFolderId;
              state.folders = data.folders || [];
            }
          } catch (e) {
            console.error('加载文件夹数据失败:', e);

          // 无数据则初始化默认文件夹
          if (!state.folders || state.folders.length === 0) {
            const defaultFolder = {
              id: genId('f'),
              name: '默认',
              createdAt: new Date().toISOString(),
              history: []

            state.folders = [defaultFolder];

            saveFolders();

        // ==================== 旧数据迁移 ====================
        function migrateOldData() {
          const oldKey = 'cet6-folders';
          const oldData = localStorage.getItem(oldKey);
          if (!oldData) return;

          try {
            const parsed = JSON.parse(oldData);
            if (!parsed.folders || !Array.isArray(parsed.folders)) {
              localStorage.removeItem(oldKey);
              return;
            }

            // 收集所有 history 的 type，判断属于哪个考试类型
            const allTypes = new Set();
            parsed.folders.forEach(f => {
              if (f.history) f.history.forEach(h => allTypes.add(h.type));
            });

            const hasPostgradTypes = allTypes.has('en-to-cn') || allTypes.has('short-essay') || allTypes.has('long-essay');
            const hasCet6Types = allTypes.has('translate') || allTypes.has('essay');

            let targetKey;
            if (hasPostgradTypes && !hasCet6Types) {
              targetKey = STORAGE_KEY_POSTGRAD;
            } else if (hasCet6Types && !hasPostgradTypes) {
              targetKey = STORAGE_KEY_CET6;
            } else if (hasCet6Types && hasPostgradTypes) {
              // 混合数据，按多数 type 判断
              let cet6Count = 0, postgradCount = 0;
              parsed.folders.forEach(f => {
                if (f.history) f.history.forEach(h => {
                  if (h.type === 'translate' || h.type === 'essay') cet6Count++;
                  if (h.type === 'en-to-cn' || h.type === 'short-essay' || h.type === 'long-essay') postgradCount++;
                  if (!h.type || h.type === 'vocab') cet6Count++; // vocab 无 type 默认为六级侧
                });
              });
              targetKey = cet6Count >= postgradCount ? STORAGE_KEY_CET6 : STORAGE_KEY_POSTGRAD;
            } else {
              // 全是 vocab 或无 type，默认迁移到六级
              targetKey = STORAGE_KEY_CET6;
            }

            // 写入目标 key（仅当目标 key 无数据时）
            if (!localStorage.getItem(targetKey)) {
              localStorage.setItem(targetKey, JSON.stringify({
                currentFolderId: parsed.currentFolderId || (parsed.folders[0]?.id || ''),
                folders: parsed.folders
              }));
            }

            // 删除旧 key
            localStorage.removeItem(oldKey);
            console.log('旧数据已迁移到:', targetKey);
          } catch (e) {
            console.error('数据迁移失败:', e);
            localStorage.removeItem(oldKey);
          }
        }

            .filter(item => item.type === 'vocab' || !item.type) // 兼容旧数据
            .map(item => ({

            .sort((a, b) => parseFloat(b.weight) - parseFloat(a.weight));
        });

        function readFileAsDataURL(file) {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.onerror = () => reject(new Error('文件读取失败'));
            reader.readAsDataURL(file);
          });
        }

        function compressImage(file) {
          return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
              const MAX_SIZE = 1024;
              let { width, height } = img;
              if (width > height && width > MAX_SIZE) {
                height = Math.round(height * MAX_SIZE / width);
                width = MAX_SIZE;
              } else if (height > MAX_SIZE) {
                width = Math.round(width * MAX_SIZE / height);
                height = MAX_SIZE;
              }

              const canvas = document.createElement('canvas');
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);

              canvas.toBlob((blob) => {
                if (!blob) { reject(new Error('图片处理失败')); return; }
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = () => reject(new Error('图片读取失败'));
                reader.readAsDataURL(blob);
              }, 'image/jpeg', 0.7);
            };
            img.onerror = () => reject(new Error('图片加载失败，请重试'));
            img.src = URL.createObjectURL(file);
          });
        }

        async function ocrImage(base64) {
          const apiKey = localStorage.getItem(STORAGE_KEY_OCR);
          if (!apiKey) {
            state.showSettings = true;
            throw new Error('请先设置通义千问视觉识别 API Key');
          }

          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 25000);

          try {
            const response = await fetch(DASHSCOPE_API_URL, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
              },
              body: JSON.stringify({
                model: QWEN_VL_MODEL,
                messages: [{
                  role: 'user',
                  content: [
                    { type: 'text', text: '请识别图片中的所有文字内容，直接输出原文，不要添加任何解释。中文输出中文，英文输出英文。' },
                    { type: 'image_url', image_url: { url: base64 } }
                  ]
                }],
                temperature: 0,
                max_tokens: 1024
              }),
              signal: controller.signal
            });

            clearTimeout(timeoutId);

            if (response.status === 401) throw new Error('❌ 千问 API Key 无效，请前往设置更新');
            if (response.status === 429) throw new Error('⏱️ 请求过于频繁，请稍后重试');
            if (!response.ok) throw new Error(`识别失败 (${response.status})，请稍后重试`);

            const data = await response.json();
            const text = data.choices?.[0]?.message?.content?.trim() || '';
            if (!text) throw new Error('未识别到文字，请重试');
            return text;
          } catch (err) {
            clearTimeout(timeoutId);
            if (err.name === 'AbortError') throw new Error('⏱️ 识别超时，请重试');
            if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
              throw new Error('⏱️ 网络连接失败，请检查网络后重试');
            }
            throw err;
          }
        }

        function cancelOcrResult() {
          state.showOcrResult = false;
          state.ocrResultText = '';
        }

        function confirmOcrResult() {
          const text = state.ocrResultText.trim();
          if (!text) return;
          state.inputText = text;
          state.showOcrResult = false;

        // ==================== 图片裁剪器 ====================
        const cropRatioOptions = [
          { label: '自由', value: 0 },
          { label: '1:1', value: 1 },
          { label: '4:3', value: 4/3 },
          { label: '3:4', value: 3/4 },
          { label: '16:9', value: 16/9 },
        ];

        function openCropper(base64, source) {
          state.cropperImage = base64;
          state.cropperSource = source;
          state.cropAspectRatio = 0;
          state.showCropper = true;
          nextTick(() => { initCropperCanvas(); });
        }

        function initCropperCanvas() {
          const canvas = document.getElementById('cropCanvas');
          const container = document.getElementById('cropContainer');
          if (!canvas || !container) return;

          const rect = container.getBoundingClientRect();
          const dpr = window.devicePixelRatio || 1;
          canvas.width = rect.width * dpr;
          canvas.height = rect.height * dpr;
          canvas.style.width = rect.width + 'px';
          canvas.style.height = rect.height + 'px';

          const img = new Image();
          img.onload = () => {
            state.cropperImg = img;
            // 计算图片在画布上的显示区域（居中、留边距）
            const padding = 8;
            const cw = rect.width;
            const ch = rect.height;
            const availW = cw - padding * 2;
            const availH = ch - padding * 2;
            const scale = Math.min(availW / img.naturalWidth, availH / img.naturalHeight);
            const displayW = img.naturalWidth * scale;
            const displayH = img.naturalHeight * scale;
            state.cropImgLeft = padding + (availW - displayW) / 2;
            state.cropImgTop = padding + (availH - displayH) / 2;
            state.cropImgDisplayW = displayW;
            state.cropImgDisplayH = displayH;

            // 默认裁剪框：覆盖图片 80% 区域，居中
            const boxW = displayW * 0.8;
            const boxH = displayH * 0.8;
            state.cropX = state.cropImgLeft + (displayW - boxW) / 2;
            state.cropY = state.cropImgTop + (displayH - boxH) / 2;
            state.cropW = boxW;
            state.cropH = boxH;
            drawCropper();
          };
          img.onerror = () => {
            showToast('图片加载失败，请重试', 'error');
            state.showCropper = false;
          };
          img.src = state.cropperImage;
        }

        function drawCropper() {
          const canvas = document.getElementById('cropCanvas');
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          const dpr = window.devicePixelRatio || 1;

          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // 深色背景
          ctx.fillStyle = '#111';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const img = state.cropperImg;
          if (!img) return;

          const il = state.cropImgLeft, it = state.cropImgTop;
          const iw = state.cropImgDisplayW, ih = state.cropImgDisplayH;
          const cx = state.cropX, cy = state.cropY, cw = state.cropW, ch = state.cropH;

          // 绘制图片（按 DPR 缩放）
          ctx.drawImage(img, il * dpr, it * dpr, iw * dpr, ih * dpr);

          // 裁剪框外的半透明遮罩（四块矩形拼合）
          ctx.fillStyle = 'rgba(0,0,0,0.55)';
          ctx.fillRect(0, 0, canvas.width, cy * dpr);                                          // 上方
          ctx.fillRect(0, (cy + ch) * dpr, canvas.width, canvas.height - (cy + ch) * dpr);     // 下方
          ctx.fillRect(0, cy * dpr, cx * dpr, ch * dpr);                                       // 左侧
          ctx.fillRect((cx + cw) * dpr, cy * dpr, canvas.width - (cx + cw) * dpr, ch * dpr);   // 右侧

          // 裁剪框白色边框
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2 * dpr;
          ctx.strokeRect(cx * dpr, cy * dpr, cw * dpr, ch * dpr);

          // 九宫格辅助线
          ctx.strokeStyle = 'rgba(255,255,255,0.25)';
          ctx.lineWidth = 1 * dpr;
          for (let i = 1; i < 3; i++) {
            const gx = (cx + cw * i / 3) * dpr;
            const gy = (cy + ch * i / 3) * dpr;
            ctx.beginPath(); ctx.moveTo(gx, cy * dpr); ctx.lineTo(gx, (cy + ch) * dpr); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx * dpr, gy); ctx.lineTo((cx + cw) * dpr, gy); ctx.stroke();
          }

          // 四角拖拽手柄（白色方块带边框）
          const hs = 14 * dpr;
          const corners = [
            { x: cx * dpr, y: cy * dpr },
            { x: (cx + cw) * dpr, y: cy * dpr },
            { x: cx * dpr, y: (cy + ch) * dpr },
            { x: (cx + cw) * dpr, y: (cy + ch) * dpr },
          ];
          corners.forEach(c => {
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = 'rgba(0,0,0,0.4)';
            ctx.lineWidth = 1.5 * dpr;
            ctx.fillRect(c.x - hs/2, c.y - hs/2, hs, hs);
            ctx.strokeRect(c.x - hs/2, c.y - hs/2, hs, hs);
          });
        }

        function getCropTouchPos(e) {
          const canvas = document.getElementById('cropCanvas');
          if (!canvas) return { x: 0, y: 0 };
          const rect = canvas.getBoundingClientRect();
          const touch = e.touches[0];
          return {
            x: touch.clientX - rect.left,
            y: touch.clientY - rect.top
          };
        }

        function findCropHandle(tx, ty) {
          const threshold = 30;
          const { cropX, cropY, cropW, cropH } = state;
          const handles = [
            { name: 'nw', x: cropX, y: cropY },
            { name: 'ne', x: cropX + cropW, y: cropY },
            { name: 'sw', x: cropX, y: cropY + cropH },
            { name: 'se', x: cropX + cropW, y: cropY + cropH },
          ];
          for (const h of handles) {
            if (Math.abs(tx - h.x) < threshold && Math.abs(ty - h.y) < threshold) return h.name;
          }
          if (tx >= cropX && tx <= cropX + cropW && ty >= cropY && ty <= cropY + cropH) return 'move';
          return null;
        }

        function onCropTouchStart(e) {
          if (!e.touches || e.touches.length === 0) return;
          const pos = getCropTouchPos(e);
          const handle = findCropHandle(pos.x, pos.y);
          if (!handle) return;

          state.cropDragging = handle;
          state.cropStartX = pos.x;
          state.cropStartY = pos.y;
          state.cropOrigBox = { x: state.cropX, y: state.cropY, w: state.cropW, h: state.cropH };
        }

        function clampCropBox(nx, ny, nw, nh) {
          const minSize = 50;
          const il = state.cropImgLeft, it = state.cropImgTop;
          const ir = il + state.cropImgDisplayW, ib = it + state.cropImgDisplayH;

          if (nw < minSize) nw = minSize;
          if (nh < minSize) nh = minSize;
          nx = Math.max(il, Math.min(nx, ir - minSize));
          ny = Math.max(it, Math.min(ny, ib - minSize));
          if (nx + nw > ir) nw = ir - nx;
          if (ny + nh > ib) nh = ib - ny;
          return { nx, ny, nw, nh };
        }

        function applyAspectRatio(nx, ny, nw, nh, orig, handle, ratio) {
          if (ratio <= 0) return { nx, ny, nw, nh };

          const wChange = orig.w > 0 ? Math.abs(nw / orig.w - 1) : 0;
          const hChange = orig.h > 0 ? Math.abs(nh / orig.h - 1) : 0;

          if (wChange >= hChange) {
            nh = nw / ratio;
            if (handle === 'nw' || handle === 'ne') ny = orig.y + orig.h - nh;
          } else {
            nw = nh * ratio;
            if (handle === 'nw' || handle === 'sw') nx = orig.x + orig.w - nw;
          }
          return { nx, ny, nw, nh };
        }

        function onCropTouchMove(e) {
          if (!state.cropDragging || !e.touches || e.touches.length === 0) return;
          const pos = getCropTouchPos(e);
          const dx = pos.x - state.cropStartX;
          const dy = pos.y - state.cropStartY;
          const orig = state.cropOrigBox;
          if (!orig) return;

          let nx = orig.x, ny = orig.y, nw = orig.w, nh = orig.h;
          const handle = state.cropDragging;

          if (handle === 'nw')      { nx = orig.x + dx; ny = orig.y + dy; nw = orig.w - dx; nh = orig.h - dy; }
          else if (handle === 'ne') { ny = orig.y + dy; nw = orig.w + dx; nh = orig.h - dy; }
          else if (handle === 'sw') { nx = orig.x + dx; nw = orig.w - dx; nh = orig.h + dy; }
          else if (handle === 'se') { nw = orig.w + dx; nh = orig.h + dy; }
          else if (handle === 'move') { nx = orig.x + dx; ny = orig.y + dy; }

          // 锁定宽高比
          const adjusted = applyAspectRatio(nx, ny, nw, nh, orig, handle, state.cropAspectRatio);
          nx = adjusted.nx; ny = adjusted.ny; nw = adjusted.nw; nh = adjusted.nh;

          // 限制在图片范围内
          const clamped = clampCropBox(nx, ny, nw, nh);
          state.cropX = clamped.nx; state.cropY = clamped.ny;
          state.cropW = clamped.nw; state.cropH = clamped.nh;

          requestAnimationFrame(() => drawCropper());
        }

        function onCropTouchEnd(e) {
          state.cropDragging = null;
          state.cropStartX = 0; state.cropStartY = 0;
          state.cropOrigBox = null;
        }

        function setCropAspectRatio(ratio) {
          // 点击已选中的比例则取消锁定
          state.cropAspectRatio = state.cropAspectRatio === ratio ? 0 : ratio;
          if (state.cropAspectRatio > 0) {
            // 立即按比例调整当前裁剪框高度
            const targetH = state.cropW / state.cropAspectRatio;
            const ib = state.cropImgTop + state.cropImgDisplayH;
            if (state.cropY + targetH > ib) {
              state.cropH = ib - state.cropY;
              state.cropW = state.cropH * state.cropAspectRatio;
            } else {
              state.cropH = targetH;
            }
          }
          drawCropper();
        }

        function confirmCrop() {
          const img = state.cropperImg;
          if (!img) return;

          const il = state.cropImgLeft, it = state.cropImgTop;
          const iw = state.cropImgDisplayW, ih = state.cropImgDisplayH;
          const cx = state.cropX, cy = state.cropY, cw = state.cropW, ch = state.cropH;

          // 将画布坐标映射回原始图片坐标
          const scaleX = img.naturalWidth / iw;
          const scaleY = img.naturalHeight / ih;
          const srcX = Math.max(0, Math.round((cx - il) * scaleX));
          const srcY = Math.max(0, Math.round((cy - it) * scaleY));
          const srcW = Math.min(img.naturalWidth - srcX, Math.round(cw * scaleX));
          const srcH = Math.min(img.naturalHeight - srcY, Math.round(ch * scaleY));

          if (srcW < 10 || srcH < 10) {
            showToast('裁剪区域太小，请重新选择', 'error');
            return;
          }

          // 创建裁剪画布
          const cropCanvas = document.createElement('canvas');
          let dstW = srcW, dstH = srcH;
          const MAX_SIZE = 1024;
          if (Math.max(dstW, dstH) > MAX_SIZE) {
            const s = MAX_SIZE / Math.max(dstW, dstH);
            dstW = Math.round(dstW * s);
            dstH = Math.round(dstH * s);
          }

          cropCanvas.width = dstW;
          cropCanvas.height = dstH;
          const cropCtx = cropCanvas.getContext('2d');
          cropCtx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, dstW, dstH);

          const resultBase64 = cropCanvas.toDataURL('image/jpeg', 0.85);
          state.showCropper = false;

          // 继续走原有的识别流程
          continueAfterCrop(resultBase64);
        }

        // ==================== 考研大作文拍照识图（VL 结构化分析） ====================
        function buildVLImagePrompt() {
          const isPic = state.essayFormData.longEssayType === 'picture';
          if (isPic) {
            return `观察这幅图画，逐行输出以下5行内容，每行必须严格以"字段名：内容"格式书写，不要用括号、不要加序号、不要写成段落。

类型：图画作文
人物/主体：写出图中的人物或主体
动作/场景：写出他们正在做什么以及场景环境
反映寓意：写出图画的深层寓意或社会现象
额外说明：用2-3句话综合描述画面全貌、人物表情、细节元素`;
          } else {
            return `观察这张图表，逐行输出以下6行内容，每行必须严格以"字段名：内容"格式书写，不要用括号、不要加序号、不要写成段落。

类型：图表作文
图表类型：柱状图或饼图或折线图或表格
标题/主题：图表标题或反映主题
关键数据：关键数据及变化
整体趋势：上升或下降或波动或稳定
反映现象：反映的社会现象或问题
额外说明：用2-3句话综合描述图表全貌、数据对比等信息`;
          }
        }

        function parseVLResult(text) {
          const fd = state.essayFormData;
          console.log('[VL原文]', text);

          // 预处理：按常见分隔符拆成片段，再逐行处理
          // VL 可能返回"人物/主体：xxx，动作/场景：yyy"等紧凑格式
          const segments = text
            .replace(/[，,]\s*(?=[^\s]{1,6}[：:])/g, '\n')  // 逗号后紧跟短字段名+冒号 → 拆行
            .replace(/[。；;]\s*(?=[^\s]{1,6}[：:])/g, '\n') // 句号/分号同理
            .split('\n');

          let detectedType = '';
          for (const segment of segments) {
            const line = segment
              .replace(/^[\s\-\*#>|]+/, '')       // 去行首符号
              .replace(/\*{1,3}/g, '')              // 去加粗标记
              .trim();
            if (!line) continue;

            // 用贪婪方式匹配 key:value
            const match = line.match(/^([^：:\n]+)[：:]\s*(.+)/);
            if (!match) continue;

            const key = match[1].trim();
            const value = match[2].trim();
            if (!value) continue;

            console.log('[VL字段]', key, '→', value.substring(0, 40));

            // 关键词匹配
            if (key.includes('类型') && !key.includes('图表')) {
              detectedType = value;
            } else if (key.includes('人物') || key.includes('主体')) {
              if (!fd.subjects) fd.subjects = value;
            } else if (key.includes('动作') || key.includes('场景') || key.includes('行为')) {
              if (!fd.action) fd.action = value;
            } else if (key.includes('寓意') || key.includes('含义') || key.includes('启示')) {
              if (!fd.meaning) fd.meaning = value;
            } else if (key.includes('图表') && (key.includes('类型') || key.includes('形式') || key.includes('种类'))) {
              fd.chartType = value;
            } else if ((key.includes('标题') || key.includes('主题')) && !key.includes('人物')) {
              fd.chartTitle = value;
            } else if (key.includes('数据') || key.includes('数值')) {
              fd.dataPoints = value;
            } else if (key.includes('趋势') || key.includes('变化') || key.includes('走向')) {
              fd.trend = value;
            } else if (key.includes('现象') || key.includes('问题')) {
              fd.phenomenon = value;
            } else if (key.includes('说明') || key.includes('描述') || key.includes('全貌') || key.includes('整体')) {
              fd.description = value;
            }
          }

          // 兜底：如果只有额外说明有内容，尝试从中提取关键信息
          if (fd.description && !fd.subjects && !fd.action && !fd.meaning && !fd.chartType) {
            const desc = fd.description;
            const subjectMatch = desc.match(/(?:图中|画面中|描绘了?|展示了?)\s*[，,]?\s*(.{2,20}?)(?:[，,。；;]|\s(?:正在|各自|分别|在|坐|站|走|看|玩|拿|举|指))/);
            if (subjectMatch && !fd.subjects) fd.subjects = subjectMatch[1].trim();
            const actionMatch = desc.match(/(?:正在|各自|分别)?(.{2,30}?)(?:[，,。]|反映了?|寓意|体现|说明)/);
            if (actionMatch && !fd.action) fd.action = actionMatch[1].trim();
          }

          // 根据类型切换表单模式
          if (detectedType.includes('图表')) {
            fd.longEssayType = 'chart';
          } else if (detectedType.includes('图画')) {
            fd.longEssayType = 'picture';
          }
        }

        async function analyzeImage(base64, prompt) {
          const apiKey = localStorage.getItem(STORAGE_KEY_OCR);
          if (!apiKey) {
            state.showSettings = true;
            throw new Error('请先设置通义千问视觉识别 API Key');
          }
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 25000);
          try {
            const response = await fetch(DASHSCOPE_API_URL, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
              },
              body: JSON.stringify({
                model: QWEN_VL_MODEL,
                messages: [{
                  role: 'user',
                  content: [
                    { type: 'text', text: prompt },
                    { type: 'image_url', image_url: { url: base64 } }
                  ]
                }],
                temperature: 0,
                max_tokens: 1024
              }),
              signal: controller.signal
            });
            clearTimeout(timeoutId);
            if (response.status === 401) throw new Error('❌ 千问 API Key 无效');
            if (response.status === 429) throw new Error('⏱️ 请求过于频繁，请稍后重试');
            if (!response.ok) throw new Error(`识别失败 (${response.status})`);
            const data = await response.json();
            return data.choices?.[0]?.message?.content?.trim() || '';
          } catch (err) {
            clearTimeout(timeoutId);
            if (err.name === 'AbortError') throw new Error('⏱️ 识别超时，请重试');
            throw err;
          }
        }

        function addWelcomeMessage() {

          // 考研大作文：直接显示结构化描述表单

            resetEssayFormData();
            state.messages.unshift({
              id: genId('m'),

              type: 'long-essay-form',
              mode: state.currentMode,
              time: new Date().toISOString(),
              showTime: false
            });
            return;
          }

          const hasKey = !!localStorage.getItem(STORAGE_KEY_API);
          const folder = currentFolder.value;
          const mode = state.currentMode;
          const cfg = examConfig.value;

          let content = cfg.welcome[mode] || `👋 欢迎使用${cfg.label}学习助手！`;

          // 统计当前考试类型的各类历史记录数量
          const historyCount = folder ? folder.history.length : 0;
          if (historyCount > 0) {
            const parts = [];
            cfg.historyTabs.forEach(tabKey => {
              const count = folder.history.filter(h => {
                if (tabKey === 'vocab') return h.type === 'vocab' || !h.type;
                return h.type === tabKey;
              }).length;
              if (count > 0) parts.push(`${count} 条${cfg.historyTabLabels[tabKey].replace(/^[^\s]+\s/, '')}`);
            });
            if (parts.length > 0) {
              content += `<br><br><span style="font-size:12px;color:#999;">📝 本文件夹已有 ${parts.join('、')} 记录，去「📊 历史记录」查看汇总</span>`;
            }
          }

          if (!hasKey) {
            content += '<br><br><span style="font-size:12px;color:#FF6B35;">⚠️ 请先点击右上角 ⚙️ 设置 API Key 以开始使用</span>';
          }

          state.messages.unshift({
            id: genId('m'),
            role: 'ai',
            type: 'welcome',
            mode: state.currentMode,
            content: content,
            time: new Date().toISOString(),
            showTime: false
          });
        }

        function formatTime(isoString) {
          const d = new Date(isoString);
          const now = new Date();
          const pad = n => String(n).padStart(2, '0');
          const timeStr = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
          const isToday = d.toDateString() === now.toDateString();
          if (isToday) return timeStr;
          return `${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${timeStr}`;
        }

        function scrollToBottom() {
          nextTick(() => {
            const area = document.querySelector('.chat-area');
            if (area) {
              area.scrollTop = area.scrollHeight;
            }
          });
        }

        // ==================== 发送查询 ====================
        function handleSend() {
          const text = state.inputText.trim();
          const mc = currentModeConfig.value;

          // 检查 API Key
          if (!localStorage.getItem(STORAGE_KEY_API)) {
            showToast('请先设置 API Key', 'error');
            state.showSettings = true;
            return;
          }

          // 解析后等待用户选择操作（翻译/作文通用）
          const awaitingAction = (mc.isTranslationMode && state.translateContext && !state.postAnalysisAction)
            || (mc.isEssayMode && state.essayContext && !state.postAnalysisAction);
          if (awaitingAction) {
            showToast('请先在上方选择操作方式', 'error');
            return;
          }

          // 批改模式：用户在底部输入栏输入译文/作文，按回车提交批改
          if (state.postAnalysisAction === 'grade') {
            if (!text) {
              state.inputError = true;
              state.inputText = '';
              const input = document.querySelector('#app .flex-shrink-0.bg-white.border-t input[type="text"]');
              if (input) {
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 300);
              }
              setTimeout(() => { state.inputError = false; }, 2000);
              return;
            }
            state.inputError = false;
            state.isSending = true;
            state.inputText = '';
            submitGrading(text);
            return;
          }

          // 作文模式——直接生成第二步：输入关键词（可为空）
          if (mc.isEssayMode && state.essayContext && state.postAnalysisAction === 'generate') {
            state.inputError = false;
            state.isSending = true;
            sendEssayWithKeywords(text || '');
            return;
          }

          // 检查空输入（作文第二步已在上面 return，不会走到这里）
          if (!text) {
            state.inputError = true;
            state.inputText = '';
            const input = document.querySelector('#app .flex-shrink-0.bg-white.border-t input[type="text"]');
            if (input) {
              input.classList.add('shake');
              setTimeout(() => input.classList.remove('shake'), 300);
            }
            setTimeout(() => { state.inputError = false; }, 2000);
            return;
          }

          // 词汇模式：检查是否是英文
          if (mc.inputValidation === 'english' && !/[a-zA-Z]/.test(text)) {
            showToast('请检查输入，目前仅支持英文内容', 'error');
            return;
          }

          // 词句查询：长文本自动精读分析
          if (state.currentMode === 'vocab') {
            const wordCount = text.trim().split(/\s+/).filter(w => /[a-zA-Z]/.test(w)).length;
            if (wordCount > 15) {
              state.inputError = false;
              state.isSending = true;
              state.inputText = '';
              sendVocabIntensiveQuery(text);
              return;
            }
          }

          state.inputError = false;
          state.isSending = true;

          // 根据模式分发
          if (state.currentMode === 'vocab') {
            sendVocabQuery(text);
          } else if (state.currentMode === 'translate') {
            sendTranslateQuery(text);
          } else if (state.currentMode === 'en-to-cn') {
            sendEnToCnQuery(text);
          } else if (mc.isEssayMode && state.currentMode !== 'long-essay') {
            sendEssayTopicQuery(text);
          } else if (state.currentMode === 'long-essay') {
            showToast('请先在上方表单填写图画/图表内容并确认', 'error');
            state.isSending = false;
          }
        }

        async function sendVocabQuery(text) {
          const mode = state.currentMode; // 捕获当前模式，防止异步期间切换导致消息串位
          // 添加用户消息
          state.messages.push({
            id: genId('m'),
            role: 'user',
            type: 'query',
            mode: mode,
            content: text,
            time: new Date().toISOString(),
            showTime: state.messages.length > 0
          });

          // 添加加载消息
          const loadingMsg = {
            id: genId('m'),
            role: 'ai',
            type: 'loading',
            mode: mode,
            content: '',
            time: new Date().toISOString(),
            showTime: false
          };
          state.messages.push(loadingMsg);
          state.inputText = '';
          scrollToBottom();

          try {
            // 调用 DeepSeek API
            const systemPrompt = buildSystemPrompt();
            const result = await callDeepSeek(systemPrompt, text);

            // 确定历史记录的合并键和显示用词
            let historyKey = text.trim();
            let displayWord = text.trim();

            // 拼写错误：修正后以正确单词为键，显示也用修正词
            const isMisspelled = result.spellCheck && !result.spellCheck.isCorrect;
            const correctedWord = (isMisspelled && result.spellCheck.correction)
              ? result.spellCheck.correction.trim()
              : null;

            if (correctedWord) {
              historyKey = correctedWord;
              displayWord = correctedWord;
            } else {
              // 语法变形（过去式/复数/比较级等）：以原型为键合并历史记录
              const firstWord = result.definition?.words?.[0];
              const rootForm = firstWord?.rootForm?.trim();
              if (rootForm && rootForm.toLowerCase() !== text.trim().toLowerCase()) {
                historyKey = rootForm;
                // displayWord 保持用户输入，结果中仍展示原变形词
              }
            }

            const normalizedWord = historyKey.toLowerCase();
            const existingRecord = findInHistory(normalizedWord);
            let historyNote = null;

            // 提取 AI 返回的频率信息
            const cetFrequency = result.cetFrequency?.level || '低频';
            const cetFrequencyScore = cetFrequency === '高频' ? 3 : cetFrequency === '中频' ? 2 : 1;
            const meaning = result.definition?.overall
              || (result.definition?.words?.[0]?.meanings?.map(m => m.meaning).join('；'))
              || (result.definition?.words?.[0]?.meaning || '');

            if (existingRecord) {
              // 更新已有记录
              existingRecord.count++;
              existingRecord.lastQuery = new Date().toISOString();
              existingRecord.cetFrequency = cetFrequency;
              existingRecord.cetFrequencyScore = cetFrequencyScore;
              if (meaning) existingRecord.meaning = meaning;
              existingRecord.lastResult = {
                spellCheck: result.spellCheck,
                definition: result.definition,
                cetFrequency: result.cetFrequency,
                extension: result.extension
              };
              saveFolders();
              historyNote = `📝 你已查询过该词，累计 ${existingRecord.count} 次`;
            } else {
              // 新增记录（存原型/修正后的正确拼写 + 完整结果）
              const lastResult = {
                spellCheck: result.spellCheck,
                definition: result.definition,
                cetFrequency: result.cetFrequency,
                extension: result.extension
              };
              addToHistory(historyKey, cetFrequency, cetFrequencyScore, meaning, lastResult);
              saveFolders();
            }

            // 附加历史提示到结果
            if (historyNote) {
              result.historyNote = historyNote;
            }

            // 替换加载消息为结果
            const loadingIndex = state.messages.findIndex(m => m.id === loadingMsg.id);
            if (loadingIndex !== -1) {
              state.messages[loadingIndex] = {
                id: genId('m'),
                role: 'ai',
                type: 'result',
                mode: mode,
                content: result,
                queryText: displayWord,
                time: new Date().toISOString(),
                showTime: false
              };
            }
          } catch (err) {
            // 替换加载消息为错误消息
            const loadingIndex = state.messages.findIndex(m => m.id === loadingMsg.id);
            if (loadingIndex !== -1) {
              state.messages[loadingIndex] = {
                id: genId('m'),
                role: 'ai',
                type: 'error',
                mode: mode,
                content: err.message || '请求失败，请稍后重试',
                time: new Date().toISOString(),
                showTime: false
              };
            }
          } finally {
            state.isSending = false;
            scrollToBottom();
          }
        }

        // ==================== 词句查询长文本精读 ====================
        async function sendVocabIntensiveQuery(text) {
          const mode = state.currentMode;
          state.messages.push({
            id: genId('m'), role: 'user', type: 'query', mode: mode,
            content: text, time: new Date().toISOString(), showTime: state.messages.length > 0
          });

          const loadingMsg = {
            id: genId('m'), role: 'ai', type: 'loading', mode: mode,
            content: '', time: new Date().toISOString(), showTime: false
          };
          state.messages.push(loadingMsg);
          scrollToBottom();

          try {
            const systemPrompt = buildIntensiveReadingPrompt('vocab');
            const result = await callDeepSeek(systemPrompt, `用户输入：${text}`);

            // 存入历史（类型标记为 intensive-reading）
            addIntensiveReadingToHistory(text, result);
            saveFolders();

            const loadingIndex = state.messages.findIndex(m => m.id === loadingMsg.id);
            if (loadingIndex !== -1) {
              state.messages[loadingIndex] = {
                id: genId('m'), role: 'ai', type: 'intensive-reading-result', mode: mode,
                content: result, queryText: text,
                time: new Date().toISOString(), showTime: false
              };
            }
          } catch (err) {
            const loadingIndex = state.messages.findIndex(m => m.id === loadingMsg.id);
            if (loadingIndex !== -1) {
              state.messages[loadingIndex] = {
                id: genId('m'), role: 'ai', type: 'error', mode: mode,
                content: err.message || '请求失败，请稍后重试',
                time: new Date().toISOString(), showTime: false
              };
            }
          } finally {
            state.isSending = false;
            scrollToBottom();
          }
        }

{

  "definition": {

注意：
- 拼写检查：如果用户输入明显不是英文单词/拼写有误，isCorrect 为 false，correction 给出正确拼写，note 说明原因。正确时 isCorrect 为 true，correction 为空
- 拼写修正后内容：当 spellCheck.isCorrect 为 false 时，说明用户拼写有误，真正想查的是 correction 中的正确单词。此时 definition（释义）、cetFrequency（频率）、extension（拓展）中所有内容都必须基于**修正后的正确单词**来分析和生成，不能基于错误的拼写
- 释义：单个单词时 overall 留空 ""。短语或句子时 overall 给出整体中文释义。word 保留用户输入的原词形式，rootForm 给出词典原形（如 took→take, children→child），inflection 标注变形类型（过去式/复数/比较级等，无变形留空 ""）。meanings 数组列出该词的所有词性和对应释义（同一词性有多个释义时合并到一个 meaning 中，用分号分隔）。派生词列出2-4个常见形式，每个需给出 word/pos/meaning
- ${freqLabel}频率：只能是"高频"/"中频"/"低频"三个值之一，detail 给出简要说明
- 扩展：常考搭配给出英文和中文释义；真题例句贴近${freqLabel}阅读/翻译难度；近义词注明词性和区别；高级表达给出词性和中文释义
- 必须返回有效的 JSON，不要包含任何 JSON 之外的内容`;

        async function sendTranslateQuery(text) {
          const mode = state.currentMode;
          state.messages.push({ id: genId('m'), role: 'user', type: 'query', mode, content: text, time: new Date().toISOString(), showTime: state.messages.length > 0 });
          const loadingMsg = { id: genId('m'), role: 'ai', type: 'loading', mode, content: '', time: new Date().toISOString(), showTime: false };
          state.messages.push(loadingMsg);
          state.inputText = '';
          scrollToBottom();
          try {
            const systemPrompt = buildTranslatePrompt();
            const result = await callDeepSeek(systemPrompt, `用户输入：${text}`);
            state.translateContext = { text, analysis: result.analysis, translationPairs: result.translationPairs };
            state.postAnalysisAction = null;
            const loadingIndex = state.messages.findIndex(m => m.id === loadingMsg.id);
            if (loadingIndex !== -1) {
              state.messages[loadingIndex] = { id: genId('m'), role: 'ai', type: 'translate-analysis', mode, content: result, queryText: text, time: new Date().toISOString(), showTime: false };
            }
          } catch (err) {
            const loadingIndex = state.messages.findIndex(m => m.id === loadingMsg.id);
            if (loadingIndex !== -1) {
              state.messages[loadingIndex] = { id: genId('m'), role: 'ai', type: 'error', mode, content: err.message || '请求失败，请稍后重试', time: new Date().toISOString(), showTime: false };
            }

        async function callDeepSeek(systemPrompt, userMessage) {
          const apiKey = localStorage.getItem(STORAGE_KEY_API);
          if (!apiKey) {
            state.showSettings = true;
            throw new Error('请先设置 API Key');
          }

          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 30000);

          try {
            const response = await fetch(DEEPSEEK_API_URL, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
              },
              body: JSON.stringify({
                model: DEEPSEEK_MODEL,
                messages: [
                  { role: 'system', content: systemPrompt },
                  { role: 'user', content: userMessage }
                ],
                temperature: 0.3,
                response_format: { type: 'json_object' }
              }),
              signal: controller.signal
            });

            clearTimeout(timeoutId);

            if (response.status === 401) {
              throw new Error('❌ API Key 无效，请前往设置更新');
            }
            if (response.status === 429) {
              throw new Error('⏱️ 请求过于频繁，请稍后重试');
            }
            if (!response.ok) {
              throw new Error(`请求失败 (${response.status})，请稍后重试`);
            }

            const data = await response.json();
            const content = data.choices?.[0]?.message?.content;
            if (!content) {
              throw new Error('AI 返回数据为空，请重试');
            }

            // 记录 Prompt 缓存命中情况（控制台查看）
            if (data.usage) {
              const hit = data.usage.prompt_cache_hit_tokens || 0;
              const miss = data.usage.prompt_cache_miss_tokens || 0;
              const total = hit + miss;
              const rate = total > 0 ? Math.round(hit / total * 100) : 0;
              console.log(`[DeepSeek 缓存] 命中: ${hit} tokens, 未命中: ${miss} tokens, 命中率: ${rate}%`);
            }

            try {
              return JSON.parse(content);
            } catch (parseErr) {
              console.error('JSON 解析失败:', content);
              throw new Error('AI 返回格式异常，请重试');
            }
          } catch (err) {
            clearTimeout(timeoutId);
            if (err.name === 'AbortError') {
              throw new Error('⏱️ 请求超时，请检查网络后重试');
            }
            if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
              throw new Error('⏱️ 网络连接失败，请检查网络后重试');
            }
            throw err;
          }
        }

        function clearApiKey() {
          localStorage.removeItem(STORAGE_KEY_API);

        async function testConnection() {
          const key = state.apiKey.trim();
          if (!key) {
            showToast('请先输入 API Key', 'error');
            return;
          }
          state.isTesting = true;
          try {
            const response = await fetch(DEEPSEEK_API_URL, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${key}`
              },
              body: JSON.stringify({
                model: DEEPSEEK_MODEL,
                messages: [{ role: 'user', content: 'Hi' }],
                max_tokens: 5
              })
            });
            if (response.ok) {
              showToast('✅ 连接成功，API Key 有效');
            } else if (response.status === 401) {
              showToast('❌ API Key 无效，请检查', 'error');
            } else {
              showToast(`❌ 连接失败 (${response.status})`, 'error');
            }
          } catch (err) {
            showToast('❌ 网络连接失败，请检查网络', 'error');
          } finally {
            state.isTesting = false;
          }
        }

        // ==================== 导出全部数据（Markdown） ====================
        function exportAllData() {
          const lines = [];
          const now = new Date();
          lines.push(`# 英语学习助手 — 全部数据导出`);
          lines.push(`> 导出时间：${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`);
          lines.push('');

          const examDefs = [
            { key: 'cet6', label: '六级', storageKey: STORAGE_KEY_CET6, freqLabel: '六级' },
            { key: 'postgrad', label: '考研', storageKey: STORAGE_KEY_POSTGRAD, freqLabel: '考研' }
          ];

          for (const exam of examDefs) {
            const raw = localStorage.getItem(exam.storageKey);
            if (!raw) continue;
            let data;
            try { data = JSON.parse(raw); } catch (e) { continue; }
            const folders = data.folders || [];
            if (folders.length === 0) continue;

            lines.push(`---`);
            lines.push('');
            lines.push(`# 📚 ${exam.label}`);
            lines.push('');

            for (const folder of folders) {
              const history = folder.history || [];
              lines.push(`## 📂 ${folder.name}`);
              lines.push(`> 创建于 ${folder.createdAt ? new Date(folder.createdAt).toLocaleString('zh-CN') : '未知'} · 共 ${history.length} 条记录`);
              lines.push('');

              // 分类汇总
              const vocabItems = history.filter(h => h.type === 'vocab' || !h.type);
              const translateItems = history.filter(h => (h.type === 'translate' || h.type === 'en-to-cn') && h.subMode !== 'intensive-reading');
              const essayItems = history.filter(h => h.type === 'essay' || h.type === 'short-essay' || h.type === 'long-essay');

              // --- 词汇 ---
              if (vocabItems.length > 0) {
                lines.push(`### 📖 词汇（${vocabItems.length} 条）`);
                lines.push('');
                lines.push('| 频率 | 单词 | 释义 | 查询次数 |');
                lines.push('|------|------|------|----------|');
                const sortedVocab = [...vocabItems].sort((a, b) => b.count - a.count);
                for (const v of sortedVocab) {
                  const freqIcon = v.cetFrequency === '高频' ? '🔴' : v.cetFrequency === '中频' ? '🟡' : '🟢';
                  const meaning = (v.meaning || '').replace(/\|/g, '、');
                  lines.push(`| ${freqIcon} ${v.cetFrequency || '未知'} | ${v.word || ''} | ${meaning} | ${v.count || 1} |`);
                }
                lines.push('');
              }

              // --- 翻译（全部内容） ---
              if (translateItems.length > 0) {
                const label = translateItems[0]?.type === 'en-to-cn' ? '英译中' : '翻译';
                lines.push(`### 🈂️ ${label}（${translateItems.length} 条）`);
                lines.push('');
                const sortedTrans = [...translateItems].sort((a, b) => new Date(b.lastQuery) - new Date(a.lastQuery));
                for (let i = 0; i < sortedTrans.length; i++) {
                  const t = sortedTrans[i];
                  const time = t.lastQuery ? new Date(t.lastQuery).toLocaleString('zh-CN') : '未知';
                  lines.push(`#### ${i + 1}. ${t.chineseText || t.englishText || '(无原文)'}`);
                  lines.push(`> ${time}`);
                  lines.push('');

                  // 精读记录导出
                  if (t.subMode === 'intensive-reading') {
                    lines.push('**📖 精读分析**');
                    lines.push('');
                    if (t.fullTranslation) {
                      lines.push('**全文翻译**');
                      lines.push(`> ${t.fullTranslation}`);
                      lines.push('');
                    }
                    if (t.sentenceAnalysis && t.sentenceAnalysis.length > 0) {
                      lines.push('**逐句对照**');
                      t.sentenceAnalysis.forEach((sa, si) => {
                        lines.push(`${si + 1}. ${sa.original}`);
                        lines.push(`   → ${sa.translation}`);
                        lines.push(`   句式：${sa.structure}`);
                      });
                      lines.push('');
                    }
                    if (t.keyVocabulary && t.keyVocabulary.length > 0) {
                      lines.push('**核心词汇**');
                      t.keyVocabulary.forEach(kv => {
                        lines.push(`- ${kv.word} ${kv.pos ? '(' + kv.pos + ')' : ''} ${kv.pronunciation || ''}：${kv.meaning}`);
                        if (kv.example) lines.push(`  例：${kv.example}`);
                      });
                      lines.push('');
                    }
                    if (t.difficultSentences && t.difficultSentences.length > 0) {
                      lines.push('**长难句精析**');
                      t.difficultSentences.forEach(ds => {
                        lines.push(`- ${ds.sentence}`);
                        lines.push(`  结构：${ds.analysis}`);
                        lines.push(`  译文：${ds.translation}`);
                      });
                      lines.push('');
                    }
                  }

                  // 题目解析（非精读记录）
                  if (t.analysis && (t.analysis.structure || t.analysis.approach)) {
                    lines.push('**📝 题目解析**');
                    if (t.analysis.structure) lines.push(`- 句子结构：${t.analysis.structure}`);
                    if (t.analysis.approach) lines.push(`- 翻译思路：${t.analysis.approach}`);
                    lines.push('');
                  }

                  // 翻译对照（优先新格式 translationPairs）
                  if (t.translationPairs && t.translationPairs.length > 0) {
                    for (const tp of t.translationPairs) {
                      lines.push(`**原文**：${tp.original}`);
                      // 简单版（兼容数组和单对象）
                      const basics = tp.basicVersions || (tp.basic ? [tp.basic] : []);
                      basics.forEach((bv, bi) => {
                        lines.push(`  📗 简单${basics.length > 1 ? ' '+(bi+1) : ''}：${bv.text || ''}`);
                        if (bv.score || bv.tips) lines.push(`    🏆 ${bv.score || ''} · ${bv.tips || ''}`);
                      });
                      // 进阶版（兼容数组和单对象）
                      const advanceds = tp.advancedVersions || (tp.advanced ? [tp.advanced] : []);
                      advanceds.forEach((av, ai) => {
                        lines.push(`  📘 进阶${advanceds.length > 1 ? ' '+(ai+1) : ''}：${av.text || ''}`);
                        if (av.highlights && av.highlights.length > 0) lines.push(`    ✨ ${av.highlights.join('；')}`);
                        if (av.knowledgePoints && av.knowledgePoints.length > 0) lines.push(`    📚 ${av.knowledgePoints.join('；')}`);
                      });
                    }
                    lines.push('');
                  } else {
                    if (t.basicVersions && t.basicVersions.length > 0) {
                      lines.push('**📗 简单拿分版**');
                      for (const bv of t.basicVersions) {
                        lines.push(`- ${bv.en || bv.zh || ''}`);
                        if (bv.score || bv.tips) lines.push(`  🏆 ${bv.score || ''} · ${bv.tips || ''}`);
                      }
                      lines.push('');
                    }
                    if (t.advancedVersions && t.advancedVersions.length > 0) {
                      lines.push('**📘 进阶高分版**');
                      for (const av of t.advancedVersions) {
                        lines.push(`- ${av.en || av.zh || ''}`);
                        if (av.highlights && av.highlights.length > 0) lines.push(`  ✨ ${av.highlights.join('；')}`);
                        if (av.knowledgePoints && av.knowledgePoints.length > 0) lines.push(`  📚 ${av.knowledgePoints.join('；')}`);
                      }
                      lines.push('');
                    }
                  }
                }
              }

              // --- 作文（全部内容） ---
              if (essayItems.length > 0) {
                const labelMap = { 'short-essay': '小作文', 'long-essay': '大作文', 'essay': '大作文' };
                lines.push(`### 📝 作文（${essayItems.length} 条）`);
                lines.push('');
                const sortedEssay = [...essayItems].sort((a, b) => new Date(b.lastQuery) - new Date(a.lastQuery));
                for (let i = 0; i < sortedEssay.length; i++) {
                  const e = sortedEssay[i];
                  const typeLabel = labelMap[e.type] || '作文';
                  const time = e.lastQuery ? new Date(e.lastQuery).toLocaleString('zh-CN') : '未知';
                  lines.push(`#### ${i + 1}. [${typeLabel}] ${e.topic || '(无题目)'}`);
                  lines.push(`> ${time}`);
                  if (e.keywordsUsed && e.keywordsUsed.length > 0) {
                    lines.push(`> 关键词：${e.keywordsUsed.join('、')}`);
                  }
                  lines.push('');

                  // 简单版模板全部段落
                  if (e.basicTemplate && e.basicTemplate.paragraphs) {
                    lines.push('**📗 简单版模板**');
                    lines.push('');
                    for (const p of e.basicTemplate.paragraphs) {
                      lines.push(`**${p.section}**`);
                      lines.push(`> ${(p.en || '').replace(/\n/g, '\n> ')}`);
                      lines.push('');
                      lines.push(`「${p.zh || ''}」`);
                      if (p.knowledge) lines.push(`📚 ${p.knowledge}`);
                      lines.push('');
                    }
                  }

                  // 进阶版模板全部段落
                  if (e.advancedTemplate && e.advancedTemplate.paragraphs) {
                    lines.push('**📘 进阶版模板**');
                    lines.push('');
                    for (const p of e.advancedTemplate.paragraphs) {
                      lines.push(`**${p.section}**`);
                      lines.push(`> ${(p.en || '').replace(/\n/g, '\n> ')}`);
                      lines.push('');
                      lines.push(`「${p.zh || ''}」`);
                      if (p.knowledge) lines.push(`📚 ${p.knowledge}`);
                      lines.push('');
                    }
                  }
                }
              }

              // --- 精读分析 ---
              const intensiveItems = history.filter(h => h.type === 'intensive-reading' || ((h.type === 'translate' || h.type === 'en-to-cn') && h.subMode === 'intensive-reading'));
              if (intensiveItems.length > 0) {
                lines.push(`### 📖 精读分析（${intensiveItems.length} 条）`);
                lines.push('');
                const sortedIntensive = [...intensiveItems].sort((a, b) => new Date(b.lastQuery) - new Date(a.lastQuery));
                for (let i = 0; i < sortedIntensive.length; i++) {
                  const r = sortedIntensive[i];
                  const time = r.lastQuery ? new Date(r.lastQuery).toLocaleString('zh-CN') : '未知';
                  lines.push(`#### ${i + 1}. ${r.englishText || r.chineseText || '(无原文)'}`);
                  lines.push(`> ${time}`);
                  lines.push('');
                  if (r.fullTranslation) {
                    lines.push('**全文翻译**');
                    lines.push(`> ${r.fullTranslation}`);
                    lines.push('');
                  }
                  if (r.sentenceAnalysis && r.sentenceAnalysis.length > 0) {
                    lines.push('**逐句对照**');
                    r.sentenceAnalysis.forEach((sa, si) => {
                      lines.push(`${si + 1}. ${sa.original}`);
                      lines.push(`   → ${sa.translation}`);
                      lines.push(`   句式：${sa.structure}`);
                    });
                    lines.push('');
                  }
                  if (r.keyVocabulary && r.keyVocabulary.length > 0) {
                    lines.push('**核心词汇**');
                    r.keyVocabulary.forEach(kv => {
                      lines.push(`- ${kv.word} ${kv.pos ? '(' + kv.pos + ')' : ''} ${kv.pronunciation || ''}：${kv.meaning}`);
                      if (kv.example) lines.push(`  例：${kv.example}`);
                    });
                    lines.push('');
                  }
                  if (r.difficultSentences && r.difficultSentences.length > 0) {
                    lines.push('**长难句精析**');
                    r.difficultSentences.forEach(ds => {
                      lines.push(`- ${ds.sentence}`);
                      lines.push(`  结构：${ds.analysis}`);
                      lines.push(`  译文：${ds.translation}`);
                    });
                    lines.push('');
                  }
                }
              }

              // 文件夹无记录
              if (history.length === 0) {
                lines.push('*该文件夹暂无记录*');
                lines.push('');
              }
            }
          }

          // 生成文件并下载
          const blob = new Blob([lines.join('\n')], { type: 'text/markdown;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
          a.download = `英语学习助手_数据导出_${dateStr}.md`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showToast('✅ 导出成功');
        }

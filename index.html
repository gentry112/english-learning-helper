        // ==================== 历史记录重建（不调 API） ====================
        function queryFromSummary(item) {
          state.currentView = 'chat';
          state.currentMode = 'vocab';
          state.essayContext = null;
          state.translateContext = null;
          state.postAnalysisAction = null;

          // 无完整结果时回退到 API 查询
          if (!item.lastResult) {
            state.inputText = item.word;
            nextTick(() => { handleSend(); });
            return;
          }

          state.messages = [];
          state.messages.push({
            id: genId('m'), role: 'user', type: 'query', mode: 'vocab',
            content: item.word, time: item.lastQuery, showTime: false
          });
          state.messages.push({
            id: genId('m'), role: 'ai', type: 'result', mode: 'vocab',
            content: {
              spellCheck: item.lastResult.spellCheck,
              definition: item.lastResult.definition,
              cetFrequency: item.lastResult.cetFrequency,
              extension: item.lastResult.extension,
              historyNote: `📝 历史记录 · 累计查询 ${item.count} 次`
            },
            queryText: item.word, time: item.lastQuery, showTime: false
          });
          scrollToBottom();
        }

        function queryTranslateFromSummary(item) {
          const mode = item.type === 'en-to-cn' ? 'en-to-cn' : 'translate';
          state.currentView = 'chat';
          state.currentMode = mode;
          state.essayContext = null;
          state.translateContext = null;
          state.postAnalysisAction = null;
          state.messages = [];

          const queryText = item.chineseText || item.englishText || '';

          // 精读记录：恢复为精读气泡
          if (item.subMode === 'intensive-reading') {
            state.translationSubMode = 'intensive-reading';
            state.messages.push({
              id: genId('m'), role: 'user', type: 'query', mode: mode,
              content: queryText, time: item.lastQuery, showTime: false
            });
            state.messages.push({
              id: genId('m'), role: 'ai', type: 'intensive-reading-result', mode: mode,
              content: {
                fullTranslation: item.fullTranslation,
                sentenceAnalysis: item.sentenceAnalysis,
                keyVocabulary: item.keyVocabulary,
                difficultSentences: item.difficultSentences,
                historyNote: `📝 历史记录 · 精读分析 · 累计 ${item.count || 1} 次`
              },
              queryText: queryText, time: item.lastQuery, showTime: false
            });
            scrollToBottom();
            return;
          }

          // 解析卡片（仅 analysis 有内容时显示）
          if (item.analysis && (item.analysis.segments?.length > 0 || item.analysis.structure || item.analysis.approach)) {
            state.messages.push({
              id: genId('m'), role: 'ai', type: 'translate-analysis', mode: mode,
              content: { analysis: item.analysis },
              queryText: queryText, time: item.lastQuery, showTime: false
            });
          }

          // 批改记录
          if (item.gradeRecord) {
            state.messages.push({
              id: genId('m'), role: 'user', type: 'query', mode: mode,
              content: item.gradeRecord.userAnswer,
              time: item.gradeRecord.gradedAt, showTime: true
            });
            state.messages.push({
              id: genId('m'), role: 'ai', type: 'translate-grade-result', mode: mode,
              content: {
                overallScore: item.gradeRecord.overallScore,
                scoreBreakdown: item.gradeRecord.scoreBreakdown,
                issues: item.gradeRecord.issues,
                improvedVersion: item.gradeRecord.improvedVersion,
                overallComment: item.gradeRecord.overallComment
              },
              queryText: queryText, time: item.gradeRecord.gradedAt, showTime: false
            });
          }

          // 示例译文（新格式 translationPairs）
          if (item.translationPairs) {
            const resultType = mode === 'translate' ? 'translate-result' : 'en-to-cn-result';
            state.messages.push({
              id: genId('m'), role: 'ai', type: resultType, mode: mode,
              content: { analysis: item.analysis, translationPairs: item.translationPairs },
              queryText: queryText, time: item.lastQuery, showTime: false
            });
          }
          // 兼容旧格式：顶层 basicVersions / advancedVersions
          else if (item.basicVersions || item.advancedVersions) {
            const resultType = mode === 'translate' ? 'translate-result' : 'en-to-cn-result';
            const oldContent = {};
            if (item.analysis) oldContent.analysis = item.analysis;
            if (item.basicVersions) oldContent.basicVersions = item.basicVersions;
            if (item.advancedVersions) oldContent.advancedVersions = item.advancedVersions;
            if (item.historyNote) oldContent.historyNote = item.historyNote;
            state.messages.push({
              id: genId('m'), role: 'ai', type: resultType, mode: mode,
              content: oldContent,
              queryText: queryText, time: item.lastQuery, showTime: false
            });
          }

          scrollToBottom();
        }

              // 触发重新渲染
              state.currentView = 'chat';
              nextTick(() => { state.currentView = 'summary'; });
            }
          });
        }

        // ==================== 初始化 ====================
        function init() {
          migrateOldData();
          loadExamType();
          loadFolders();
          loadApiKey();
          loadOcrApiKey();
          document.title = examConfig.value.title;
          addWelcomeMessage();
          scrollToBottom();
          // 首次未设置 API Key 时弹出欢迎弹窗
          if (!localStorage.getItem(STORAGE_KEY_API)) {
            setTimeout(() => { state.showWelcomeModal = true; }, 500);
          }
        }

        function openSettingsFromWelcome() {
          state.showWelcomeModal = false;
          setTimeout(() => { state.showSettings = true; }, 300);
        }

        onMounted(() => {
          init();
        });

        // ==================== 导出 ====================
        return {
          state,
          examConfig,
          currentModeConfig,
          inputPlaceholder,
          keywordGuideText,
          currentFolder,
          currentModeMessages,
          sortedVocabulary,
          sortedTranslations,
          sortedEssays,
          sortedEnToCn,
          sortedShortEssays,
          sortedLongEssays,
          sortedIntensiveReadings,
          // 计算属性
          visibleModeKeys,
          isEssayGroupActive,
          // 方法
          handleSend,
          openCamera,
          onPhotoTaken,
          cancelOcrResult,
          confirmOcrResult,
          confirmVLResult,
          cancelVLResult,
          switchMode,
          switchGroupedMode,
          isModeActive,
          modeDisplayLabel,
          switchEssaySubMode,
          confirmResetChat,
          switchTranslationSubMode,
          switchExamType,
          submitEssayForm,
          submitLongEssayForm,
          openEssayCamera,
          onEssayPhotoTaken,
          choosePostAnalysisAction,
          submitGrading,
          toggleFolderDropdown,
          openNewFolderDialog,
          createFolder,
          switchFolder,
          confirmDeleteFolder,
          openSummary,
          queryFromSummary,
          queryTranslateFromSummary,
          queryEssayFromSummary,
          queryIntensiveReadingFromSummary,
          confirmClearHistory,
          deleteHistoryItem,
          saveApiKey,
          clearApiKeyConfirm,
          clearApiKey,
          testConnection,
          openSettingsFromWelcome,
          exportAllData,
          clearAllData,
          cancelConfirm,
          executeConfirm,
          formatTime,
          hasExtensionContent,
          countWords,
          // 裁剪器
          cropRatioOptions,
          onCropTouchStart,
          onCropTouchMove,
          onCropTouchEnd,
          setCropAspectRatio,
          confirmCrop,
          cancelCrop,
        };
      }
    }).mount('#app');
  </script>

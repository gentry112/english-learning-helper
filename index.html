<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>英语学习助手</title>

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'wechat-green': '#95EC69',
            'cet-orange': '#FF6B35',
            'bg-gray': '#F5F5F5',
            'text-dark': '#333333',
            'border-light': '#E5E5E5',
          }
        }
      }
    }
  </script>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #EDEDED; }

    /* 聊天区域滚动 */
    .chat-area { -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }

    /* 加载三点动画 */
    @keyframes dotBlink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
    .dot-1, .dot-2, .dot-3 { animation: dotBlink 1.4s infinite both; }
    .dot-2 { animation-delay: 0.2s; }
    .dot-3 { animation-delay: 0.4s; }

    /* 输入框抖动 */
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    .shake { animation: shake 0.3s ease-in-out; }

    /* Toast 动画 */
    .toast-enter-active { animation: toastIn 0.3s ease-out; }
    .toast-leave-active { animation: toastOut 0.3s ease-in; }
    @keyframes toastIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes toastOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-100%); opacity: 0; } }

    /* 弹窗入场 */
    @keyframes modalIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
    .modal-enter { animation: modalIn 0.2s ease-out; }

    /* 消息入场 */
    @keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .msg-enter { animation: msgIn 0.25s ease-out; }

    /* 自定义滚动条 */
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: #D0D0D0; border-radius: 2px; }

    /* 长按选中禁用 */
    .no-select { -webkit-user-select: none; user-select: none; }

    /* 多 Tab 适配小屏 */
    .tab-btn { white-space: nowrap; }
  </style>
</head>
<body class="flex justify-center items-start min-h-[100dvh] bg-[#EDEDED]">

  <div id="app" class="w-full max-w-[480px] h-[100dvh] flex flex-col bg-white relative overflow-hidden shadow-lg">

    <!-- ==================== Toast 提示 ==================== -->
    <transition name="toast">
      <div v-if="state.toast.show" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] px-5 py-2.5 rounded-lg shadow-md text-sm font-medium no-select" :class="state.toast.type === 'success' ? 'bg-green-500 text-white' : state.toast.type === 'error' ? 'bg-red-500 text-white' : 'bg-gray-800 text-white'">
        {{ state.toast.message }}
      </div>
    </transition>

    <!-- ==================== 考试类型切换栏（颜色随考试类型变化） ==================== -->
    <div :class="['flex-shrink-0 flex items-center px-2 py-1 gap-1.5 z-20 transition-all duration-300', state.examType === 'cet6' ? 'bg-gradient-to-r from-green-500 to-emerald-500' : 'bg-gradient-to-r from-blue-500 to-indigo-500']">
      <button @click="switchExamType('cet6')"
        :class="['flex-1 text-xs py-1.5 rounded-full font-medium transition-all', state.examType === 'cet6' ? 'bg-white text-green-600 shadow-sm' : 'text-white/80 hover:text-white hover:bg-white/10']">
        📚 六级
      </button>
      <button @click="switchExamType('postgrad')"
        :class="['flex-1 text-xs py-1.5 rounded-full font-medium transition-all', state.examType === 'postgrad' ? 'bg-white text-indigo-600 shadow-sm' : 'text-white/80 hover:text-white hover:bg-white/10']">
        📖 考研
      </button>
    </div>

    <!-- ==================== 对话主视图 ==================== -->
    <template v-if="state.currentView === 'chat'">
      <!-- 顶部导航栏 -->
      <div class="flex-shrink-0 h-11 bg-white border-b border-border-light flex items-center justify-between px-3 z-10">
        <div class="relative">
          <button @click.stop="toggleFolderDropdown()" class="flex items-center gap-1 text-sm font-medium text-text-dark hover:opacity-70 transition-opacity px-1 py-1">
            <span>📂</span>
            <span class="max-w-[140px] truncate">{{ currentFolder ? currentFolder.name : '' }}</span>
            <span class="text-xs text-gray-400">▼</span>
          </button>
        </div>
        <div class="flex items-center gap-3">
          <button @click="openSummary()" class="text-lg hover:opacity-70 transition-opacity" title="重点词汇">📊</button>
          <button @click="state.showSettings = true" class="text-lg hover:opacity-70 transition-opacity" title="设置">⚙️</button>
        </div>
      </div>

      <!-- 模式切换 Tab — 从考试类型配置动态生成 -->
      <div class="flex-shrink-0 bg-white border-b border-border-light flex items-center px-2 py-1.5 gap-1 z-10">
        <button v-for="(modeCfg, modeKey) in examConfig.modes" :key="modeKey"
          @click="switchMode(modeKey)"
          :class="['flex-1 tab-btn text-xs py-1.5 rounded-full font-medium transition-all', state.currentMode === modeKey ? 'bg-wechat-green text-text-dark shadow-sm' : 'text-gray-500 hover:bg-gray-100']">
          {{ modeCfg.label }}
        </button>
      </div>

      <!-- 聊天消息区域 -->
      <div class="flex-1 overflow-y-auto chat-area px-3 py-3 bg-[#F5F5F5]" ref="chatArea">
        <!-- 空状态：无文件夹且无消息 -->
        <div v-if="currentModeMessages.length === 0" class="flex flex-col items-center justify-center h-full text-gray-400">
          <div class="text-5xl mb-4">📚</div>
          <div class="text-sm">{{ examConfig.emptyHint[state.currentMode] || '暂无消息' }}</div>
        </div>

        <!-- 消息列表 -->
        <div v-for="msg in currentModeMessages" :key="msg.id" class="mb-3 msg-enter">
          <!-- 时间标签 -->
          <div v-if="msg.showTime" class="text-center text-xs text-gray-400 mb-2">{{ formatTime(msg.time) }}</div>

          <!-- 欢迎消息 / 系统消息 -->
          <div v-if="msg.type === 'welcome'" class="flex justify-start">
            <div class="max-w-[85%] bg-white border border-border-light rounded-xl px-3.5 py-2.5 text-sm text-text-dark leading-relaxed shadow-sm">
              <div v-html="msg.content"></div>
            </div>
          </div>

          <!-- 用户消息气泡（右侧绿色） -->
          <div v-if="msg.type === 'query'" class="flex justify-end">
            <div class="max-w-[80%] bg-wechat-green rounded-xl px-3.5 py-2.5 text-sm text-text-dark leading-relaxed shadow-sm">
              {{ msg.content }}
            </div>
          </div>

          <!-- 加载动画 -->
          <div v-if="msg.type === 'loading'" class="flex justify-start">
            <div class="bg-white border border-border-light rounded-xl px-4 py-2.5 text-sm text-gray-500 shadow-sm flex items-center gap-1">
              <span>⏳ 正在查询</span>
              <span class="dot-1">.</span><span class="dot-2">.</span><span class="dot-3">.</span>
            </div>
          </div>

          <!-- AI 结果气泡（左侧白色卡片） -->
          <div v-if="msg.type === 'result'" class="flex justify-start">
            <div class="max-w-[90%] bg-white border border-border-light rounded-xl px-3.5 py-3 text-sm text-text-dark leading-relaxed shadow-sm">
              <!-- 📝 拼写检查（仅拼写有误时显示） -->
              <div v-if="msg.content.spellCheck && !msg.content.spellCheck.isCorrect" class="pb-2.5 border-b border-gray-100">
                <div class="font-semibold text-text-dark mb-1">📝 拼写检查</div>
                <div class="text-cet-orange">
                  ⚠️ {{ msg.content.spellCheck?.note || '可能拼写有误' }}
                  <span v-if="msg.content.spellCheck?.correction" class="font-medium">，建议改为：{{ msg.content.spellCheck.correction }}</span>
                </div>
              </div>

              <!-- 📖 释义 -->
              <div class="py-2.5 border-b border-gray-100">
                <div class="font-semibold text-text-dark mb-1">📖 释义</div>
                <div v-if="msg.content.definition" class="text-gray-700">
                  <!-- 整体释义（仅短语/句子时显示：先英文原文，再中文释义） -->
                  <div v-if="msg.content.definition.overall" class="mb-2 bg-yellow-50 rounded-lg px-3 py-2 text-sm">
                    <div class="font-medium text-text-dark mb-1">{{ msg.queryText }}</div>
                    <div class="text-gray-600">{{ msg.content.definition.overall }}</div>
                  </div>
                  <!-- 逐词拆解 -->
                  <div v-if="msg.content.definition.words && msg.content.definition.words.length > 0">
                    <div v-for="(w, wi) in msg.content.definition.words" :key="wi" class="mb-2 last:mb-0">
                      <div class="font-medium text-text-dark mb-0.5">
                        {{ w.word }}
                        <span v-if="w.rootForm && w.rootForm !== w.word" class="text-gray-400 font-normal">({{ w.rootForm }})</span>
                        <span v-if="w.inflection" class="text-gray-400 font-normal text-xs ml-1">· {{ w.inflection }}</span>
                      </div>
                      <!-- 词性+释义，每词性一行 -->
                      <div v-if="w.meanings && w.meanings.length > 0">
                        <div v-for="(m, mi) in w.meanings" :key="mi" class="text-gray-600 text-xs ml-2">
                          <span class="text-gray-400">{{ m.pos }}</span> {{ m.meaning }}
                        </div>
                      </div>
                      <!-- 兼容旧格式 -->
                      <div v-else-if="w.pos" class="text-gray-600 text-xs ml-2">
                        <span class="text-gray-400">{{ w.pos }}</span> {{ w.meaning }}
                      </div>
                      <!-- 派生词 -->
                      <div v-if="w.derivatives && w.derivatives.length > 0" class="text-gray-400 text-xs ml-2 mt-0.5">
                        派生：
                        <span v-for="(d, di) in w.derivatives" :key="di">
                          <span v-if="di > 0">、</span>
                          {{ d.word }} <span v-if="d.pos">({{ d.pos }})</span> <span v-if="d.meaning">{{ d.meaning }}</span>
                        </span>
                      </div>
                    </div>
                  </div>
                  <div v-else class="text-gray-400 text-xs">暂无拆解数据</div>
                </div>
                <div v-else class="text-gray-400 text-xs">暂无释义数据</div>
              </div>

              <!-- 📊 频率 -->
              <div class="py-2.5 border-b border-gray-100">
                <div class="font-semibold text-text-dark mb-1">📊 频率</div>
                <div v-if="msg.content.cetFrequency">
                  <span class="font-medium">
                    <span v-if="msg.content.cetFrequency.level === '高频'">🔴 {{ examConfig.frequencyLabel }}高频</span>
                    <span v-else-if="msg.content.cetFrequency.level === '中频'">🟡 {{ examConfig.frequencyLabel }}中频</span>
                    <span v-else>🟢 {{ examConfig.frequencyLabel }}低频</span>
                  </span>
                  <div v-if="msg.content.cetFrequency.detail" class="text-gray-500 text-xs mt-0.5">{{ msg.content.cetFrequency.detail }}</div>
                </div>
                <div v-else class="text-gray-400 text-xs">暂无频率数据</div>
              </div>

              <!-- 📝 学习记录 -->
              <div class="py-1.5 border-b border-gray-100 text-xs text-gray-400">
                {{ msg.content.historyNote || '📝 首次查询' }}
              </div>

              <!-- 📚 拓展 -->
              <div class="pt-2.5">
                <div class="font-semibold text-text-dark mb-1">📚 拓展</div>
                <div v-if="hasExtensionContent(msg)">
                  <!-- 常考搭配 -->
                  <div v-if="msg.content.extension?.collocations && msg.content.extension.collocations.length > 0" class="mb-2">
                    <div class="text-xs text-gray-400 mb-0.5">常考搭配：</div>
                    <div v-for="(c, ci) in msg.content.extension.collocations" :key="'col_'+ci" class="text-gray-700 text-xs ml-2 mb-0.5">
                      • {{ c.en }} <span class="text-gray-400">{{ c.zh }}</span>
                    </div>
                  </div>
                  <!-- 真题例句 -->
                  <div v-if="msg.content.extension?.exampleSentence" class="mb-2 bg-gray-50 rounded-lg px-3 py-2">
                    <div class="text-xs text-gray-400 mb-0.5">真题例句：</div>
                    <div class="text-gray-700 text-sm italic">{{ msg.content.extension.exampleSentence.en }}</div>
                    <div class="text-gray-500 text-xs mt-0.5">{{ msg.content.extension.exampleSentence.zh }}</div>
                  </div>
                  <!-- 近义词 -->
                  <div v-if="msg.content.extension?.synonyms && msg.content.extension.synonyms.length > 0" class="mb-2">
                    <div class="text-xs text-gray-400 mb-0.5">近义词辨析：</div>
                    <div v-for="(s, si) in msg.content.extension.synonyms" :key="'syn_'+si" class="text-gray-700 text-xs ml-2 mb-0.5">
                      • {{ s.word }} <span class="text-gray-400">({{ s.pos }})</span> {{ s.difference }}
                    </div>
                  </div>
                  <!-- 高级替换 -->
                  <div v-if="msg.content.extension?.advancedAlternatives && msg.content.extension.advancedAlternatives.length > 0">
                    <div class="text-xs text-gray-400 mb-0.5">写作高级表达：</div>
                    <div v-for="(a, ai) in msg.content.extension.advancedAlternatives" :key="'alt_'+ai" class="text-gray-700 text-xs ml-2 mb-0.5">
                      ✨ {{ a.word }} <span class="text-gray-400">({{ a.pos }})</span> {{ a.meaning }}
                    </div>
                  </div>
                </div>
                <div v-else class="text-gray-400 text-xs">暂无扩展数据</div>
              </div>
            </div>
          </div>

          <!-- 错误消息 -->
          <div v-if="msg.type === 'error'" class="flex justify-start">
            <div class="max-w-[85%] bg-red-50 border border-red-200 rounded-xl px-3.5 py-2.5 text-sm text-red-600 leading-relaxed shadow-sm">
              {{ msg.content }}
            </div>
          </div>

          <!-- 🈂️ 中译英结果气泡 -->
          <!-- 🈂️ 翻译结果气泡（中译英 / 英译中 共用模板） -->
          <div v-if="msg.type === 'translate-result' || msg.type === 'en-to-cn-result'" class="flex justify-start">
            <div class="max-w-[90%] bg-white border border-border-light rounded-xl px-3.5 py-3 text-sm text-text-dark leading-relaxed shadow-sm">
              <!-- 📝 题目解析 -->
              <div class="pb-2.5 border-b border-gray-100" v-if="msg.content.analysis">
                <div class="font-semibold text-text-dark mb-1">📝 题目解析</div>
                <div v-if="msg.content.analysis.structure" class="text-gray-600 text-xs mb-1">
                  <span class="text-gray-400">句子结构：</span>{{ msg.content.analysis.structure }}
                </div>
                <div v-if="msg.content.analysis.approach" class="text-gray-600 text-xs">
                  <span class="text-gray-400">翻译思路：</span>{{ msg.content.analysis.approach }}
                </div>
              </div>

              <!-- 📗 简单拿分版 -->
              <div class="py-2.5 border-b border-gray-100" v-if="msg.content.basicVersions && msg.content.basicVersions.length > 0">
                <div class="font-semibold text-text-dark mb-2">📗 简单拿分版</div>
                <div v-for="(v, vi) in msg.content.basicVersions" :key="'bv_'+vi" class="mb-2.5 last:mb-0 bg-green-50 rounded-lg px-3 py-2">
                  <div class="font-medium text-text-dark text-sm">{{ v.en || v.zh }}</div>
                  <div class="text-xs text-gray-400 mt-1">
                    <span v-if="v.score">🏆 {{ v.score }} · </span>
                    <span>{{ v.tips }}</span>
                  </div>
                </div>
              </div>

              <!-- 📘 进阶高分版 -->
              <div class="pt-2.5" v-if="msg.content.advancedVersions && msg.content.advancedVersions.length > 0">
                <div class="font-semibold text-text-dark mb-2">📘 进阶高分版</div>
                <div v-for="(v, vi) in msg.content.advancedVersions" :key="'av_'+vi" class="mb-2.5 last:mb-0 bg-blue-50 rounded-lg px-3 py-2">
                  <div class="font-medium text-text-dark text-sm">{{ v.en || v.zh }}</div>
                  <div v-if="v.highlights && v.highlights.length > 0" class="mt-1.5">
                    <div class="text-xs text-gray-400 mb-0.5">✨ 亮点：</div>
                    <div v-for="(h, hi) in v.highlights" :key="'hl_'+hi" class="text-xs text-gray-600 ml-2">• {{ h }}</div>
                  </div>
                  <div v-if="v.knowledgePoints && v.knowledgePoints.length > 0" class="mt-1">
                    <div class="text-xs text-gray-400 mb-0.5">📚 知识点：</div>
                    <div v-for="(k, ki) in v.knowledgePoints" :key="'kp_'+ki" class="text-xs text-gray-600 ml-2">• {{ k }}</div>
                  </div>
                </div>
              </div>

              <!-- 学习记录 -->
              <div v-if="msg.content.historyNote" class="mt-2 pt-2 border-t border-gray-100 text-xs text-gray-400">
                {{ msg.content.historyNote }}
              </div>
            </div>
          </div>

          <!-- 📝 作文题目解析气泡（六级大作文 / 考研小作文 / 考研大作文 共用） -->
          <div v-if="msg.type === 'essay-analysis' || msg.type === 'short-essay-analysis' || msg.type === 'long-essay-analysis'" class="flex justify-start">
            <div class="max-w-[90%] bg-white border border-border-light rounded-xl px-3.5 py-3 text-sm text-text-dark leading-relaxed shadow-sm">
              <!-- 题目 -->
              <div class="mb-2 bg-yellow-50 rounded-lg px-3 py-2 text-sm">
                <div class="text-xs text-gray-400 mb-0.5">{{ currentModeConfig.analysisTitle || '📝 题目' }}</div>
                <div class="font-medium text-text-dark">{{ msg.queryText }}</div>
              </div>

              <!-- 题目解析 — 按字段存在性条件渲染 -->
              <div v-if="msg.content.topicAnalysis" class="space-y-2">
                <div v-if="msg.content.topicAnalysis.type" class="flex items-center gap-2 text-xs">
                  <span class="text-gray-400">类型：</span>
                  <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-medium">{{ msg.content.topicAnalysis.type }}</span>
                </div>
                <div v-if="msg.content.topicAnalysis.keyPoints && msg.content.topicAnalysis.keyPoints.length > 0">
                  <div class="text-xs text-gray-400 mb-0.5">📌 核心要点：</div>
                  <div v-for="(kp, ki) in msg.content.topicAnalysis.keyPoints" :key="'kp_'+ki" class="text-xs text-gray-600 ml-2 mb-0.5">• {{ kp }}</div>
                </div>
                <div v-if="msg.content.topicAnalysis.imageMeaning && msg.content.topicAnalysis.imageMeaning.length > 0">
                  <div class="text-xs text-gray-400 mb-0.5">🎯 图画寓意：</div>
                  <div v-for="(im, ii) in msg.content.topicAnalysis.imageMeaning" :key="'im_'+ii" class="text-xs text-gray-600 ml-2 mb-0.5">• {{ im }}</div>
                </div>
                <div v-if="msg.content.topicAnalysis.keyArguments && msg.content.topicAnalysis.keyArguments.length > 0">
                  <div class="text-xs text-gray-400 mb-0.5">📌 核心论点：</div>
                  <div v-for="(ka, ki) in msg.content.topicAnalysis.keyArguments" :key="'ka_'+ki" class="text-xs text-gray-600 ml-2 mb-0.5">• {{ ka }}</div>
                </div>
                <div v-if="msg.content.topicAnalysis.format">
                  <div class="text-xs text-gray-400 mb-0.5">📐 格式结构：</div>
                  <div class="text-xs text-gray-600 bg-gray-50 rounded px-2 py-1">{{ msg.content.topicAnalysis.format }}</div>
                </div>
                <div v-if="msg.content.topicAnalysis.structure">
                  <div class="text-xs text-gray-400 mb-0.5">📐 建议结构：</div>
                  <div class="text-xs text-gray-600 bg-gray-50 rounded px-2 py-1">{{ msg.content.topicAnalysis.structure }}</div>
                </div>
                <div v-if="msg.content.topicAnalysis.traps && msg.content.topicAnalysis.traps.length > 0">
                  <div class="text-xs text-gray-400 mb-0.5">⚠️ 避坑指南：</div>
                  <div v-for="(t, ti) in msg.content.topicAnalysis.traps" :key="'tp_'+ti" class="text-xs text-cet-orange ml-2 mb-0.5">• {{ t }}</div>
                </div>
              </div>

              <!-- 考研大作文：结构化图画/图表描述表单 -->
              <div v-if="msg.type === 'long-essay-analysis' && msg.content.topicAnalysis" class="mt-3 space-y-2">
                <!-- 图画作文表单 -->
                <template v-if="msg.content.topicAnalysis.type && msg.content.topicAnalysis.type.includes('图画')">
                  <div class="text-xs text-gray-500 mb-1">🎨 请描述图画内容，帮助 AI 更准确生成模板：</div>
                  <input v-model="state.essayFormData.subjects" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-xs outline-none focus:border-green-400" placeholder="图中人物/主体（如：一对父子、一群学生）">
                  <input v-model="state.essayFormData.action" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-xs outline-none focus:border-green-400" placeholder="他们在做什么（如：各看各的手机、围坐讨论）">
                  <input v-model="state.essayFormData.meaning" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-xs outline-none focus:border-green-400" placeholder="反映什么寓意（如：手机依赖导致人际疏离）">
                </template>
                <!-- 图表作文表单 -->
                <template v-else-if="msg.content.topicAnalysis.type && msg.content.topicAnalysis.type.includes('图表')">
                  <div class="text-xs text-gray-500 mb-1">📊 请描述图表内容，帮助 AI 更准确生成模板：</div>

                  <input v-model="state.essayFormData.trend" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-xs outline-none focus:border-green-400" placeholder="整体趋势（如：持续上升/先升后降/逐年稳定增长）">

          </div>

          <!-- 📝 作文模板结果气泡（六级大作文 / 考研小作文 / 考研大作文 共用） -->

                  <div class="text-text-dark text-sm leading-relaxed mb-1.5 whitespace-pre-wrap">{{ p.en }}</div>

          <input
            v-model="state.inputText"
            @keydown.enter="handleSend()"
            @input="state.inputError = false"
            :class="['w-full bg-[#F5F5F5] rounded-full px-4 py-2.5 text-sm outline-none border transition-colors', state.inputError ? 'border-red-400 shake' : 'border-transparent focus:border-wechat-green']"

        </div>

          :disabled="state.isSending"
          :class="['flex-shrink-0 w-9 h-9 rounded-full flex items-center justify-center text-white text-sm transition-all', (state.inputText.trim() && !state.isSending) ? 'bg-wechat-green hover:opacity-80 active:scale-95' : 'bg-gray-300 cursor-not-allowed']"

          <span v-else class="text-xs">...</span>
        </button>
      </div>
    </template>

    <!-- ==================== 重点词汇汇总视图 ==================== -->
    <template v-if="state.currentView === 'summary'">

      <div class="flex-shrink-0 h-11 bg-white border-b border-border-light flex items-center justify-between px-3 z-10">

        <span class="text-sm font-semibold text-text-dark">历史记录</span>

                  <span class="text-cet-orange font-bold text-sm">⭐{{ item.weight }}</span>
                  <button @click.stop="deleteHistoryItem(item._historyIndex)" class="w-5 h-5 rounded-full bg-gray-100 text-gray-400 hover:bg-red-100 hover:text-red-500 text-xs flex items-center justify-center">✕</button>
                </div>
              </div>
              <div class="text-gray-500 text-xs ml-6 mb-1">{{ item.meaning }}</div>
              <div class="text-gray-400 text-xs ml-6">
                查询{{ item.count }}次 | {{ item.cetFrequency }} | 权重{{ item.weight }}
              </div>
            </div>
          </template>

          <!-- ====== 翻译列表（中译英 / 英译中 共用） ====== -->
          <template v-if="state.summaryTab === 'translate' || state.summaryTab === 'en-to-cn'">
            <div v-if="!sortedTranslations || sortedTranslations.length === 0" class="flex flex-col items-center justify-center py-20 text-gray-400">
              <div class="text-5xl mb-4">📭</div>
              <div class="text-sm mb-1">暂无翻译记录</div>
              <div class="text-xs">去翻译模式练几句吧！</div>

            <div v-for="(item, idx) in sortedTranslations" :key="idx" @click="queryTranslateFromSummary(item.chineseText || item.englishText)" class="bg-white rounded-xl px-4 py-3 mb-2.5 shadow-sm border border-gray-100 active:bg-gray-50 cursor-pointer transition-colors">
              <div class="flex items-center justify-between mb-1">
                <span class="font-semibold text-text-dark text-sm leading-relaxed flex-1 mr-2">{{ item.chineseText || item.englishText }}</span>
                <button @click.stop="deleteHistoryItem(item._historyIndex)" class="flex-shrink-0 w-5 h-5 rounded-full bg-gray-100 text-gray-400 hover:bg-red-100 hover:text-red-500 text-xs flex items-center justify-center ml-1">✕</button>
              </div>
              <div v-if="item.basicVersions && item.basicVersions[0]" class="text-gray-500 text-xs ml-0 mb-1 line-clamp-1">
                简单版：{{ item.basicVersions[0].en || item.basicVersions[0].zh }}
              </div>
              <div class="text-gray-400 text-xs">
                {{ formatTime(item.lastQuery) }}
              </div>
            </div>
          </template>

          <!-- ====== 作文列表（六级大作文） ====== -->
          <template v-if="state.summaryTab === 'essay'">

              <div class="text-5xl mb-4">📭</div>
              <div class="text-sm mb-1">暂无作文记录</div>
              <div class="text-xs">去大作文模式写几篇吧！</div>
            </div>
            <div v-for="(item, idx) in sortedEssays" :key="idx" @click="queryEssayFromSummary(item.topic)" class="bg-white rounded-xl px-4 py-3 mb-2.5 shadow-sm border border-gray-100 active:bg-gray-50 cursor-pointer transition-colors">
              <div class="flex items-center justify-between mb-1">
                <span class="font-semibold text-text-dark text-sm leading-relaxed flex-1 mr-2">{{ item.topic }}</span>
                <button @click.stop="deleteHistoryItem(item._historyIndex)" class="flex-shrink-0 w-5 h-5 rounded-full bg-gray-100 text-gray-400 hover:bg-red-100 hover:text-red-500 text-xs flex items-center justify-center ml-1">✕</button>
              </div>
              <div v-if="item.basicTemplate && item.basicTemplate.paragraphs" class="text-gray-500 text-xs ml-0 mb-1 line-clamp-1">
                {{ item.basicTemplate.paragraphs[0]?.section }}：{{ item.basicTemplate.paragraphs[0]?.en?.substring(0, 50) }}...
              </div>
              <div class="text-gray-400 text-xs">
                {{ formatTime(item.lastQuery) }}
              </div>
            </div>
          </template>

          <template v-if="state.summaryTab === 'short-essay'">
            <div v-if="!sortedShortEssays || sortedShortEssays.length === 0" class="flex flex-col items-center justify-center py-20 text-gray-400">
              <div class="text-5xl mb-4">📭</div>
              <div class="text-sm mb-1">暂无小作文记录</div>
              <div class="text-xs">去小作文模式写几篇吧！</div>
            </div>
            <div v-for="(item, idx) in sortedShortEssays" :key="idx" @click="queryEssayFromSummary(item.topic)" class="bg-white rounded-xl px-4 py-3 mb-2.5 shadow-sm border border-gray-100 active:bg-gray-50 cursor-pointer transition-colors">
              <div class="flex items-center justify-between mb-1">
                <span class="font-semibold text-text-dark text-sm leading-relaxed flex-1 mr-2">{{ item.topic }}</span>
                <button @click.stop="deleteHistoryItem(item._historyIndex)" class="flex-shrink-0 w-5 h-5 rounded-full bg-gray-100 text-gray-400 hover:bg-red-100 hover:text-red-500 text-xs flex items-center justify-center ml-1">✕</button>
              </div>
              <div v-if="item.basicTemplate && item.basicTemplate.paragraphs" class="text-gray-500 text-xs ml-0 mb-1 line-clamp-1">
                {{ item.basicTemplate.paragraphs[0]?.section }}：{{ item.basicTemplate.paragraphs[0]?.en?.substring(0, 50) }}...
              </div>
              <div class="text-gray-400 text-xs">
                {{ formatTime(item.lastQuery) }}
              </div>
            </div>
          </template>

          <!-- ====== 大作文列表（考研） ====== -->
          <template v-if="state.summaryTab === 'long-essay'">
            <div v-if="!sortedLongEssays || sortedLongEssays.length === 0" class="flex flex-col items-center justify-center py-20 text-gray-400">
              <div class="text-5xl mb-4">📭</div>
              <div class="text-sm mb-1">暂无大作文记录</div>
              <div class="text-xs">去大作文模式写几篇吧！</div>
            </div>
            <div v-for="(item, idx) in sortedLongEssays" :key="idx" @click="queryEssayFromSummary(item.topic)" class="bg-white rounded-xl px-4 py-3 mb-2.5 shadow-sm border border-gray-100 active:bg-gray-50 cursor-pointer transition-colors">
              <div class="flex items-center justify-between mb-1">
                <span class="font-semibold text-text-dark text-sm leading-relaxed flex-1 mr-2">{{ item.topic }}</span>
                <button @click.stop="deleteHistoryItem(item._historyIndex)" class="flex-shrink-0 w-5 h-5 rounded-full bg-gray-100 text-gray-400 hover:bg-red-100 hover:text-red-500 text-xs flex items-center justify-center ml-1">✕</button>
              </div>
              <div v-if="item.basicTemplate && item.basicTemplate.paragraphs" class="text-gray-500 text-xs ml-0 mb-1 line-clamp-1">
                {{ item.basicTemplate.paragraphs[0]?.section }}：{{ item.basicTemplate.paragraphs[0]?.en?.substring(0, 50) }}...
              </div>
              <div class="text-gray-400 text-xs">
                {{ formatTime(item.lastQuery) }}
              </div>
            </div>
          </template>
        </div>
      </div>

        <button @click="state.currentView = 'chat'" class="w-full bg-wechat-green text-text-dark font-medium rounded-full py-2.5 text-sm hover:opacity-80 transition-opacity active:scale-[0.98]">
          💬 返回对话
        </button>
      </div>
    </template>

    <!-- ==================== 文件夹下拉菜单 ==================== -->
    <template v-if="state.showFolderDropdown">
      <!-- 半透明遮罩 -->
      <div @click="state.showFolderDropdown = false" class="fixed inset-0 z-20 bg-black/10"></div>
      <!-- 下拉菜单 -->
      <div class="absolute top-11 left-3 z-30 bg-white rounded-xl shadow-lg border border-border-light py-1.5 min-w-[200px] modal-enter">
        <div v-for="folder in state.folders" :key="folder.id" class="flex items-center justify-between px-4 py-2.5 hover:bg-gray-50 cursor-pointer transition-colors" @click="switchFolder(folder.id)">
          <div class="flex items-center gap-2 text-sm">
            <span v-if="folder.id === state.currentFolderId" class="text-wechat-green text-xs">✓</span>
            <span v-else class="text-xs w-3"></span>
            <span :class="folder.id === state.currentFolderId ? 'font-medium text-text-dark' : 'text-gray-600'">{{ folder.name }}</span>
          </div>
          <button v-if="state.folders.length > 1" @click.stop="confirmDeleteFolder(folder.id)" class="text-gray-300 hover:text-red-400 text-xs transition-colors px-1">✕</button>
        </div>
        <div class="border-t border-gray-100 my-1"></div>
        <div @click="openNewFolderDialog()" class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-500 hover:bg-gray-50 cursor-pointer transition-colors">
          <span>➕</span> 新建文件夹
        </div>
      </div>
    </template>

    <!-- ==================== 设置弹窗 ==================== -->
    <template v-if="state.showSettings">
      <div @click="state.showSettings = false" class="fixed inset-0 z-40 bg-black/40 flex items-center justify-center p-4">
        <div @click.stop class="bg-white rounded-2xl w-full max-w-[340px] shadow-xl modal-enter overflow-hidden">
          <!-- 标题栏 -->
          <div class="flex items-center justify-between px-5 py-3.5 border-b border-gray-100">
            <span class="font-semibold text-text-dark">⚙️ 设置</span>
            <button @click="state.showSettings = false" class="text-gray-400 hover:text-gray-600 text-lg leading-none">✕</button>
          </div>

          <!-- 内容 -->
          <div class="px-5 py-4 space-y-4">
            <!-- AI 服务 -->
            <div>
              <label class="text-xs text-gray-500 mb-1.5 block">AI 服务</label>
              <div class="bg-gray-100 rounded-lg px-3 py-2.5 text-sm text-text-dark font-medium">
                DeepSeek ▼
              </div>
            </div>

            <!-- API Key -->
            <div>
              <label class="text-xs text-gray-500 mb-1.5 block">API Key</label>
              <div class="flex items-center gap-1 bg-gray-50 rounded-lg border border-gray-200 focus-within:border-wechat-green transition-colors">
                <input
                  v-model="state.apiKey"
                  :type="state.apiKeyVisible ? 'text' : 'password'"
                  class="flex-1 bg-transparent px-3 py-2.5 text-sm outline-none"

                />
                <button @click="state.apiKeyVisible = !state.apiKeyVisible" class="px-2 text-gray-400 hover:text-gray-600 text-sm transition-colors">

                </button>
              </div>
            </div>

            <!-- 测试连接 -->
            <button @click="testConnection()" :disabled="state.isTesting" class="w-full text-sm text-gray-500 border border-gray-200 rounded-lg py-2 hover:bg-gray-50 transition-colors disabled:opacity-50">
              {{ state.isTesting ? '⏳ 测试中...' : '🔗 测试连接' }}
            </button>

            <!-- 费用提示 -->
            <div class="text-xs text-gray-400 bg-blue-50 rounded-lg px-3 py-2">
              💡 DeepSeek API 按使用量计费，费用极低，新用户通常有免费额度。
              <a href="https://platform.deepseek.com/" target="_blank" class="text-blue-500 underline ml-1">去注册 →</a>
            </div>

            <!-- 操作按钮 -->
            <div class="flex gap-2.5 pt-1">
              <button @click="clearApiKeyConfirm()" class="flex-1 text-sm border border-gray-200 text-gray-500 rounded-lg py-2.5 hover:bg-gray-50 transition-colors">清除</button>
              <button @click="saveApiKey()" class="flex-1 text-sm bg-wechat-green text-text-dark font-medium rounded-lg py-2.5 hover:opacity-80 transition-opacity">保存</button>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- ==================== 新建文件夹弹窗 ==================== -->
    <template v-if="state.showNewFolderDialog">
      <div @click="state.showNewFolderDialog = false" class="fixed inset-0 z-40 bg-black/40 flex items-center justify-center p-4">
        <div @click.stop class="bg-white rounded-2xl w-full max-w-[300px] shadow-xl modal-enter overflow-hidden">
          <div class="px-5 py-4">
            <div class="font-semibold text-text-dark mb-3">新建文件夹</div>
            <input
              v-model="state.newFolderName"
              @keydown.enter="createFolder(state.newFolderName)"
              class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-wechat-green transition-colors"
              placeholder="输入文件夹名称"
              autofocus
            />
            <div class="flex gap-2.5 mt-3.5">
              <button @click="state.showNewFolderDialog = false" class="flex-1 text-sm border border-gray-200 text-gray-500 rounded-lg py-2 hover:bg-gray-50 transition-colors">取消</button>
              <button @click="createFolder(state.newFolderName)" :disabled="!state.newFolderName.trim()" class="flex-1 text-sm bg-wechat-green text-text-dark font-medium rounded-lg py-2 hover:opacity-80 transition-opacity disabled:opacity-40 disabled:cursor-not-allowed">确认</button>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- ==================== 确认弹窗 ==================== -->
    <template v-if="state.confirmDialog.show">
      <div @click="cancelConfirm()" class="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4">
        <div @click.stop class="bg-white rounded-2xl w-full max-w-[280px] shadow-xl modal-enter overflow-hidden">
          <div class="px-5 py-4 text-center">
            <div class="text-sm text-text-dark leading-relaxed mb-4">{{ state.confirmDialog.message }}</div>
            <div class="flex gap-2.5">
              <button @click="cancelConfirm()" class="flex-1 text-sm border border-gray-200 text-gray-500 rounded-lg py-2 hover:bg-gray-50 transition-colors">取消</button>
              <button @click="executeConfirm()" class="flex-1 text-sm bg-red-500 text-white font-medium rounded-lg py-2 hover:bg-red-600 transition-colors">确认</button>
            </div>
          </div>
        </div>
      </div>
    </template>

  </div>

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <script>
    const { createApp, reactive, computed, nextTick, onMounted } = Vue;

    createApp({
      setup() {
        // ==================== 常量 ====================
        const DEEPSEEK_API_URL = 'https://api.deepseek.com/v1/chat/completions';
        const DEEPSEEK_MODEL = 'deepseek-chat';
        const STORAGE_KEY_API = 'cet6-api-key';
        const STORAGE_KEY_EXAM_TYPE = 'exam-type';
        const STORAGE_KEY_CET6 = 'cet6-data';
        const STORAGE_KEY_POSTGRAD = 'postgrad-data';

        // ==================== 考试类型配置 ====================
        const EXAM_CONFIG = {
          cet6: {
            label: '六级',
            title: '六级词汇翻译助手',
            storageKey: STORAGE_KEY_CET6,
            frequencyLabel: '六级',
            modes: {

              translate: { key: 'translate', label: '🈂️ 中译英', isEssayMode: false, isTranslationMode: true, translationField: 'chineseText', translationPreviewField: 'en', inputValidation: 'none' },
              essay: { key: 'essay', label: '📝 大作文', isEssayMode: true, isTranslationMode: false, analysisMsgType: 'essay-analysis', resultMsgType: 'essay-result', analysisTitle: '📝 作文题目', inputValidation: 'none' }
            },
            historyTabs: ['vocab', 'translate', 'essay'],
            historyTabLabels: { vocab: '📖 词汇', translate: '🈂️ 翻译', essay: '📝 作文' },
            welcome: {
              vocab: '👋 欢迎使用六级词汇翻译助手！输入任意英文词汇/短语/句子，我将为你提供释义、六级频率和考试扩展。<br><span style="font-size:12px;color:#999;">💡 点击顶部文件夹名可创建新文件夹，按真题篇目分类管理</span>',
              translate: '🈂️ 欢迎使用中译英训练！输入中文句子，我将为你解析句子结构、提供简单拿分版和进阶高分版译文。<br><span style="font-size:12px;color:#999;">💡 按照六级翻译评分标准，帮你拿到翻译高分</span>',
              essay: '📝 欢迎使用大作文训练！输入作文题目，我将为你解析题目、提供简单版和进阶版写作模板。<br><span style="font-size:12px;color:#999;">💡 你可以提供想用的关键词，我会把它们融入模板中</span>'
            },
            placeholder: {
              vocab: '输入英文词汇/短语...',
              translate: '输入中文句子...',
              essay: '输入作文题目...',
              essayKeyword: '输入关键词或句式（可跳过）...'
            },
            emptyHint: {
              vocab: '暂无消息，输入英文词汇开始学习吧',
              translate: '暂无消息，输入中文句子开始翻译吧',
              essay: '暂无消息，输入作文题目开始吧'
            },
            keywordGuide: '💡 请告诉我你想用到的关键词或句式（如"environmental protection, sustainable development"），我会把它们融入写作模板中。<br><span class="text-gray-400" style="font-size:12px;">直接发送空内容可跳过此步骤，自动生成模板。</span>'
          },

          postgrad: {
            label: '考研',
            title: '考研英语一学习助手',
            storageKey: STORAGE_KEY_POSTGRAD,
            frequencyLabel: '考研',
            modes: {
              vocab: { key: 'vocab', label: '📖 词汇查询', isEssayMode: false, isTranslationMode: false, inputValidation: 'english' },
              'en-to-cn': { key: 'en-to-cn', label: '🈂️ 英译中', isEssayMode: false, isTranslationMode: true, translationField: 'englishText', translationPreviewField: 'zh', inputValidation: 'none' },
              'short-essay': { key: 'short-essay', label: '✉️ 小作文', isEssayMode: true, isTranslationMode: false, analysisMsgType: 'short-essay-analysis', resultMsgType: 'short-essay-result', analysisTitle: '✉️ 小作文题目', inputValidation: 'none' },
              'long-essay': { key: 'long-essay', label: '📝 大作文', isEssayMode: true, isTranslationMode: false, analysisMsgType: 'long-essay-analysis', resultMsgType: 'long-essay-result', analysisTitle: '📝 大作文题目', inputValidation: 'none' }
            },
            historyTabs: ['vocab', 'en-to-cn', 'short-essay', 'long-essay'],
            historyTabLabels: { vocab: '📖 词汇', 'en-to-cn': '🈂️ 英译中', 'short-essay': '✉️ 小作文', 'long-essay': '📝 大作文' },
            welcome: {
              vocab: '👋 欢迎使用考研英语一学习助手！输入任意英文词汇/短语/句子，我将为你提供释义、考研频率和考试扩展。<br><span style="font-size:12px;color:#999;">💡 点击顶部文件夹名可创建新文件夹，按真题篇目分类管理</span>',
              'en-to-cn': '🈂️ 欢迎使用英译中训练！输入英文段落（考研翻译真题 Part C），我将为你解析句子结构、提供简单拿分版和进阶高分版中文译文。<br><span style="font-size:12px;color:#999;">💡 按照考研英语一翻译评分标准，帮你拿到翻译高分</span>',
              'short-essay': '✉️ 欢迎使用小作文训练！输入应用文题目（书信/通知/备忘录等），我将为你解析题目、提供简单版和进阶版写作模板。<br><span style="font-size:12px;color:#999;">💡 你可以提供想用的关键词，我会把它们融入模板中</span>',
              'long-essay': '📝 欢迎使用大作文训练！输入图画/图表描述，我将为你解析题目、提供简单版和进阶版写作模板。<br><span style="font-size:12px;color:#999;">💡 你可以提供想用的关键词，我会把它们融入模板中</span>'
            },
            placeholder: {
              vocab: '输入英文词汇/短语...',
              'en-to-cn': '输入英文段落...',
              'short-essay': '输入小作文题目...',
              'short-essay-keyword': '输入关键词或句式（可跳过）...',
              'long-essay': '输入大作文题目/图画描述...',
              'long-essay-keyword': '输入关键词或句式（可跳过）...'
            },
            emptyHint: {
              vocab: '暂无消息，输入英文词汇开始学习吧',
              'en-to-cn': '暂无消息，输入英文段落开始翻译吧',
              'short-essay': '暂无消息，输入小作文题目开始吧',
              'long-essay': '暂无消息，输入大作文题目/图画描述开始吧'
            },
            keywordGuide: {
              'short-essay': '💡 请告诉我你想用到的关键词或句式，我会把它们融入写作模板中。<br><span class="text-gray-400" style="font-size:12px;">直接发送空内容可跳过此步骤，自动生成模板。</span>',
              'long-essay': '💡 请告诉我你想用到的关键词或句式（如"smartphone addiction, social isolation"），我会把它们融入写作模板中。<br><span class="text-gray-400" style="font-size:12px;">直接发送空内容可跳过此步骤，自动生成模板。</span>'
            }
          }
        };

        // ==================== 响应式状态 ====================
        const state = reactive({
          // 考试类型
          examType: 'cet6',             // 'cet6' | 'postgrad'

          currentView: 'chat',          // 'chat' | 'summary'
          currentMode: 'vocab',         // 值域随考试类型变化
          summaryTab: 'vocab',          // 值域随考试类型变化
          currentFolderId: null,
          folders: [],
          messages: [],
          inputText: '',
          inputError: false,
          isSending: false,

          // 作文两步交互上下文（统一用于所有 essay 模式）
          essayContext: null,           // { topic, analysis } | null
          // 考研大作文结构化描述表单
          essayFormData: {
            subjects: '', children: '', action: '', meaning: '',  // 图画作文
            chartType: '', chartTitle: '', dataPoints: '', trend: '', phenomenon: '',  // 图表作文
            extraKeywords: ''
          },

          showSettings: false,
          apiKey: '',
          apiKeyVisible: false,
          isTesting: false,

          showFolderDropdown: false,
          showNewFolderDialog: false,
          newFolderName: '',

          toast: { show: false, message: '', type: 'success' },

          confirmDialog: { show: false, message: '', onConfirm: null },
        });

        // ==================== 工具函数 ====================
        function genId(prefix) {
          return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
        }

        // ==================== 数据持久化 ====================
        function loadFolders() {
          const key = examConfig.value.storageKey;
          try {
            const raw = localStorage.getItem(key);
            if (raw) {
              const data = JSON.parse(raw);
              state.currentFolderId = data.currentFolderId;
              state.folders = data.folders || [];
            }
          } catch (e) {
            console.error('加载文件夹数据失败:', e);
          }

          // 无数据则初始化默认文件夹
          if (!state.folders || state.folders.length === 0) {
            const defaultFolder = {
              id: genId('f'),
              name: '默认',
              createdAt: new Date().toISOString(),
              history: []
            };
            state.folders = [defaultFolder];
            state.currentFolderId = defaultFolder.id;
            saveFolders();
          }

          // 确保 currentFolderId 有效
          if (!state.folders.find(f => f.id === state.currentFolderId)) {
            state.currentFolderId = state.folders[0].id;
          }
        }

        function saveFolders() {
          const key = examConfig.value.storageKey;
          try {
            localStorage.setItem(key, JSON.stringify({
              currentFolderId: state.currentFolderId,
              folders: state.folders
            }));
          } catch (e) {
            showToast('数据保存失败，请检查浏览器存储空间', 'error');
          }
        }

        // ==================== 旧数据迁移 ====================
        function migrateOldData() {
          const oldKey = 'cet6-folders';
          const oldData = localStorage.getItem(oldKey);
          if (!oldData) return;

          try {
            const parsed = JSON.parse(oldData);
            if (!parsed.folders || !Array.isArray(parsed.folders)) {
              localStorage.removeItem(oldKey);
              return;
            }

            // 收集所有 history 的 type，判断属于哪个考试类型
            const allTypes = new Set();
            parsed.folders.forEach(f => {
              if (f.history) f.history.forEach(h => allTypes.add(h.type));
            });

            const hasPostgradTypes = allTypes.has('en-to-cn') || allTypes.has('short-essay') || allTypes.has('long-essay');
            const hasCet6Types = allTypes.has('translate') || allTypes.has('essay');

            let targetKey;
            if (hasPostgradTypes && !hasCet6Types) {
              targetKey = STORAGE_KEY_POSTGRAD;
            } else if (hasCet6Types && !hasPostgradTypes) {
              targetKey = STORAGE_KEY_CET6;
            } else if (hasCet6Types && hasPostgradTypes) {
              // 混合数据，按多数 type 判断
              let cet6Count = 0, postgradCount = 0;
              parsed.folders.forEach(f => {
                if (f.history) f.history.forEach(h => {
                  if (h.type === 'translate' || h.type === 'essay') cet6Count++;
                  if (h.type === 'en-to-cn' || h.type === 'short-essay' || h.type === 'long-essay') postgradCount++;
                  if (!h.type || h.type === 'vocab') cet6Count++; // vocab 无 type 默认为六级侧
                });
              });
              targetKey = cet6Count >= postgradCount ? STORAGE_KEY_CET6 : STORAGE_KEY_POSTGRAD;
            } else {
              // 全是 vocab 或无 type，默认迁移到六级
              targetKey = STORAGE_KEY_CET6;
            }

            // 写入目标 key（仅当目标 key 无数据时）
            if (!localStorage.getItem(targetKey)) {
              localStorage.setItem(targetKey, JSON.stringify({
                currentFolderId: parsed.currentFolderId || (parsed.folders[0]?.id || ''),
                folders: parsed.folders
              }));
            }

            // 删除旧 key
            localStorage.removeItem(oldKey);
            console.log('旧数据已迁移到:', targetKey);
          } catch (e) {
            console.error('数据迁移失败:', e);
            localStorage.removeItem(oldKey);
          }
        }

        // ==================== 考试类型切换 ====================
        function loadExamType() {
          const saved = localStorage.getItem(STORAGE_KEY_EXAM_TYPE);
          if (saved === 'cet6' || saved === 'postgrad') {
            state.examType = saved;
          }
        }

        function saveExamType() {
          localStorage.setItem(STORAGE_KEY_EXAM_TYPE, state.examType);
        }

        function switchExamType(type) {
          if (state.examType === type) return;

          state.examType = type;
          saveExamType();
          document.title = examConfig.value.title;

          // 重置模式到 vocab（两个考试类型共用）
          state.currentMode = 'vocab';
          state.summaryTab = examConfig.value.historyTabs[0];

          // 重新加载该考试类型的数据
          loadFolders();

          // 清空旧消息
          state.messages = [];
          state.essayContext = null;
          resetEssayFormData();
          state.inputText = '';
          addWelcomeMessage();
          scrollToBottom();

          showToast(`已切换到${examConfig.value.label}模式`);
        }

        function loadApiKey() {
          state.apiKey = localStorage.getItem(STORAGE_KEY_API) || '';
        }

        // ==================== 计算属性 ====================
        const examConfig = computed(() => EXAM_CONFIG[state.examType]);
        const currentModeConfig = computed(() => examConfig.value.modes[state.currentMode] || {});

        const inputPlaceholder = computed(() => {
          const cfg = examConfig.value;
          const mc = currentModeConfig.value;
          if (mc.isEssayMode && state.essayContext) {
            return cfg.placeholder[state.currentMode + '-keyword']
              || cfg.placeholder.essayKeyword
              || '输入关键词或句式（可跳过）...';
          }
          return cfg.placeholder[state.currentMode] || '输入内容...';
        });

        const keywordGuideText = computed(() => {
          const guide = examConfig.value.keywordGuide;
          if (typeof guide === 'string') return guide;
          return guide?.[state.currentMode] || '';
        });

        const currentFolder = computed(() => {
          return state.folders.find(f => f.id === state.currentFolderId) || null;
        });

        const currentModeMessages = computed(() => {
          return state.messages.filter(m => m.mode === state.currentMode);
        });

        const sortedVocabulary = computed(() => {
          const folder = currentFolder.value;
          if (!folder || !folder.history || folder.history.length === 0) return [];
          return [...folder.history]
            .map((item, idx) => ({ ...item, _historyIndex: idx }))
            .filter(item => item.type === 'vocab' || !item.type) // 兼容旧数据
            .map(item => ({
              ...item,
              weight: calcWeight(item.count, item.cetFrequencyScore || 1)
            }))
            .sort((a, b) => parseFloat(b.weight) - parseFloat(a.weight));
        });

        const sortedTranslations = computed(() => {
          const folder = currentFolder.value;
          if (!folder || !folder.history || folder.history.length === 0) return [];
          return [...folder.history]
            .map((item, idx) => ({ ...item, _historyIndex: idx }))
            .filter(item => item.type === 'translate' || item.type === 'en-to-cn')
            .sort((a, b) => new Date(b.lastQuery) - new Date(a.lastQuery));
        });

        const sortedEssays = computed(() => {
          const folder = currentFolder.value;
          if (!folder || !folder.history || folder.history.length === 0) return [];
          return [...folder.history]
            .map((item, idx) => ({ ...item, _historyIndex: idx }))
            .filter(item => item.type === 'essay')
            .sort((a, b) => new Date(b.lastQuery) - new Date(a.lastQuery));
        });

        const sortedEnToCn = computed(() => {
          const folder = currentFolder.value;
          if (!folder || !folder.history || folder.history.length === 0) return [];
          return [...folder.history]
            .map((item, idx) => ({ ...item, _historyIndex: idx }))
            .filter(item => item.type === 'en-to-cn')
            .sort((a, b) => new Date(b.lastQuery) - new Date(a.lastQuery));
        });

        const sortedShortEssays = computed(() => {
          const folder = currentFolder.value;
          if (!folder || !folder.history || folder.history.length === 0) return [];
          return [...folder.history]
            .map((item, idx) => ({ ...item, _historyIndex: idx }))
            .filter(item => item.type === 'short-essay')
            .sort((a, b) => new Date(b.lastQuery) - new Date(a.lastQuery));
        });

        const sortedLongEssays = computed(() => {
          const folder = currentFolder.value;
          if (!folder || !folder.history || folder.history.length === 0) return [];
          return [...folder.history]
            .map((item, idx) => ({ ...item, _historyIndex: idx }))
            .filter(item => item.type === 'long-essay')
            .sort((a, b) => new Date(b.lastQuery) - new Date(a.lastQuery));
        });

        function calcWeight(count, cetFrequencyScore) {
          return (count * 0.4 + cetFrequencyScore * 0.6).toFixed(1);
        }

        // 判断是否有扩展内容
        function hasExtensionContent(msg) {
          const ext = msg.content?.extension;
          if (!ext) return false;
          if (ext.collocations && ext.collocations.length > 0) return true;
          if (ext.exampleSentence) return true;
          if (ext.synonyms && ext.synonyms.length > 0) return true;
          if (ext.advancedAlternatives && ext.advancedAlternatives.length > 0) return true;
          return false;
        }

        // ==================== Toast ====================
        let toastTimer = null;
        function showToast(message, type = 'success') {
          if (toastTimer) clearTimeout(toastTimer);
          state.toast = { show: true, message, type };
          toastTimer = setTimeout(() => {
            state.toast.show = false;
          }, 1500);
        }

        // ==================== 确认弹窗 ====================
        function showConfirm(message, onConfirm) {
          state.confirmDialog = { show: true, message, onConfirm };
        }
        function cancelConfirm() {
          state.confirmDialog = { show: false, message: '', onConfirm: null };
        }
        function executeConfirm() {
          if (state.confirmDialog.onConfirm) {
            state.confirmDialog.onConfirm();
          }
          cancelConfirm();
        }

        // ==================== 文件夹操作 ====================
        function createFolder(name) {
          const trimmed = name.trim();
          if (!trimmed) {
            showToast('请输入文件夹名称', 'error');
            return;
          }
          const newFolder = {
            id: genId('f'),
            name: trimmed,
            createdAt: new Date().toISOString(),
            history: []
          };
          state.folders.push(newFolder);
          state.currentFolderId = newFolder.id;
          saveFolders();
          state.showNewFolderDialog = false;
          state.newFolderName = '';
          state.showFolderDropdown = false;
          resetChat();
          showToast(`已创建并切换到「${trimmed}」`);
        }

        function switchFolder(id) {
          if (state.currentFolderId === id) {
            state.showFolderDropdown = false;
            return;
          }
          state.currentFolderId = id;
          saveFolders();
          state.showFolderDropdown = false;
          resetChat();
          const folder = state.folders.find(f => f.id === id);
          if (folder) {
            showToast(`已切换到「${folder.name}」`);
          }
        }

        function confirmDeleteFolder(id) {
          const folder = state.folders.find(f => f.id === id);
          if (!folder) return;
          if (state.folders.length <= 1) {
            showToast('至少保留一个文件夹', 'error');
            return;
          }
          showConfirm(`确定删除文件夹「${folder.name}」？该文件夹下的所有学习记录将被清除。`, () => {
            deleteFolder(id);
          });
        }

        function deleteFolder(id) {
          if (state.folders.length <= 1) return;
          state.folders = state.folders.filter(f => f.id !== id);
          if (state.currentFolderId === id) {
            state.currentFolderId = state.folders[0].id;
            resetChat();
          }
          state.showFolderDropdown = false;
          saveFolders();
          showToast('文件夹已删除');
        }

        function toggleFolderDropdown() {
          state.showFolderDropdown = !state.showFolderDropdown;
        }

        function switchMode(mode) {
          if (state.currentMode === mode) return;
          state.currentMode = mode;
          state.essayContext = null;
          resetEssayFormData();
          state.inputText = '';
          addWelcomeMessage();
          scrollToBottom();
        }

        function openNewFolderDialog() {
          state.showFolderDropdown = false;
          state.showNewFolderDialog = true;
          state.newFolderName = '';
          nextTick(() => {
            const input = document.querySelector('#app input[placeholder="输入文件夹名称"]');
            if (input) input.focus();
          });
        }

        // ==================== 聊天消息 ====================
        function resetChat() {
          state.messages = [];
          state.inputText = '';
          state.inputError = false;
          state.essayContext = null;
          addWelcomeMessage();
        }

        function addWelcomeMessage() {
          // 当前模式已有消息则跳过
          if (state.messages.some(m => m.mode === state.currentMode)) return;

          const hasKey = !!localStorage.getItem(STORAGE_KEY_API);
          const folder = currentFolder.value;
          const mode = state.currentMode;
          const cfg = examConfig.value;

          let content = cfg.welcome[mode] || `👋 欢迎使用${cfg.label}学习助手！`;

          // 统计当前考试类型的各类历史记录数量
          const historyCount = folder ? folder.history.length : 0;
          if (historyCount > 0) {
            const parts = [];
            cfg.historyTabs.forEach(tabKey => {
              const count = folder.history.filter(h => {
                if (tabKey === 'vocab') return h.type === 'vocab' || !h.type;
                return h.type === tabKey;
              }).length;
              if (count > 0) parts.push(`${count} 条${cfg.historyTabLabels[tabKey].replace(/^[^\s]+\s/, '')}`);
            });
            if (parts.length > 0) {
              content += `<br><br><span style="font-size:12px;color:#999;">📝 本文件夹已有 ${parts.join('、')} 记录，去「📊 历史记录」查看汇总</span>`;
            }
          }

          if (!hasKey) {
            content += '<br><br><span style="font-size:12px;color:#FF6B35;">⚠️ 请先点击右上角 ⚙️ 设置 API Key 以开始使用</span>';
          }

          state.messages.unshift({
            id: genId('m'),
            role: 'ai',
            type: 'welcome',
            mode: state.currentMode,
            content: content,
            time: new Date().toISOString(),
            showTime: false
          });
        }

        function formatTime(isoString) {
          const d = new Date(isoString);
          const now = new Date();
          const pad = n => String(n).padStart(2, '0');
          const timeStr = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
          const isToday = d.toDateString() === now.toDateString();
          if (isToday) return timeStr;
          return `${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${timeStr}`;
        }

        function scrollToBottom() {
          nextTick(() => {
            const area = document.querySelector('.chat-area');
            if (area) {
              area.scrollTop = area.scrollHeight;
            }
          });
        }

        // ==================== 发送查询 ====================
        function handleSend() {
          const text = state.inputText.trim();
          const mc = currentModeConfig.value;

          // 检查 API Key
          if (!localStorage.getItem(STORAGE_KEY_API)) {
            showToast('请先设置 API Key', 'error');
            state.showSettings = true;
            return;
          }

          // 作文模式第二步：输入关键词（可为空）
          if (mc.isEssayMode && state.essayContext) {
            state.inputError = false;
            state.isSending = true;
            sendEssayWithKeywords(text || '');
            return;
          }

          // 检查空输入（作文第二步已在上面 return，不会走到这里）
          if (!text) {
            state.inputError = true;
            state.inputText = '';
            const input = document.querySelector('#app .flex-shrink-0.bg-white.border-t input[type="text"]');
            if (input) {
              input.classList.add('shake');
              setTimeout(() => input.classList.remove('shake'), 300);
            }
            setTimeout(() => { state.inputError = false; }, 2000);
            return;
          }

          // 词汇模式：检查是否是英文
          if (mc.inputValidation === 'english' && !/[a-zA-Z]/.test(text)) {
            showToast('请检查输入，目前仅支持英文内容', 'error');
            return;
          }

          state.inputError = false;
          state.isSending = true;

          // 根据模式分发
          if (state.currentMode === 'vocab') {
            sendVocabQuery(text);
          } else if (state.currentMode === 'translate') {
            sendTranslateQuery(text);
          } else if (state.currentMode === 'en-to-cn') {
            sendEnToCnQuery(text);
          } else if (mc.isEssayMode) {
            sendEssayTopicQuery(text);
          }
        }

        async function sendVocabQuery(text) {
          // 添加用户消息
          state.messages.push({
            id: genId('m'),
            role: 'user',
            type: 'query',
            mode: state.currentMode,
            content: text,
            time: new Date().toISOString(),
            showTime: state.messages.length > 0
          });

          // 添加加载消息
          const loadingMsg = {
            id: genId('m'),
            role: 'ai',
            type: 'loading',
            mode: state.currentMode,
            content: '',
            time: new Date().toISOString(),
            showTime: false
          };
          state.messages.push(loadingMsg);
          state.inputText = '';
          scrollToBottom();

          try {
            // 调用 DeepSeek API
            const systemPrompt = buildSystemPrompt();
            const result = await callDeepSeek(systemPrompt, text);

            // 检查历史记录：如有拼写纠正则用纠正后的词
            const correctedWord = (result.spellCheck && !result.spellCheck.isCorrect && result.spellCheck.correction)
              ? result.spellCheck.correction.trim()
              : text.trim();
            const normalizedWord = correctedWord.toLowerCase();
            const existingRecord = findInHistory(normalizedWord);
            let historyNote = null;

            // 提取 AI 返回的频率信息
            const cetFrequency = result.cetFrequency?.level || '低频';
            const cetFrequencyScore = cetFrequency === '高频' ? 3 : cetFrequency === '中频' ? 2 : 1;
            const meaning = result.definition?.overall
              || (result.definition?.words?.[0]?.meanings?.map(m => m.meaning).join('；'))
              || (result.definition?.words?.[0]?.meaning || '');

            if (existingRecord) {
              // 更新已有记录
              existingRecord.count++;
              existingRecord.lastQuery = new Date().toISOString();
              existingRecord.cetFrequency = cetFrequency;
              existingRecord.cetFrequencyScore = cetFrequencyScore;
              if (meaning) existingRecord.meaning = meaning;
              saveFolders();
              historyNote = `📝 你已查询过该词，累计 ${existingRecord.count} 次`;
            } else {
              // 新增记录（存纠正后的正确拼写）
              addToHistory(correctedWord, cetFrequency, cetFrequencyScore, meaning);
              saveFolders();
            }

            // 附加历史提示到结果
            if (historyNote) {
              result.historyNote = historyNote;
            }

            // 替换加载消息为结果
            const loadingIndex = state.messages.findIndex(m => m.id === loadingMsg.id);
            if (loadingIndex !== -1) {
              state.messages[loadingIndex] = {
                id: genId('m'),
                role: 'ai',
                type: 'result',
                mode: state.currentMode,
                content: result,
                queryText: text,
                time: new Date().toISOString(),
                showTime: false
              };
            }
          } catch (err) {
            // 替换加载消息为错误消息
            const loadingIndex = state.messages.findIndex(m => m.id === loadingMsg.id);
            if (loadingIndex !== -1) {
              state.messages[loadingIndex] = {
                id: genId('m'),
                role: 'ai',
                type: 'error',
                mode: state.currentMode,
                content: err.message || '请求失败，请稍后重试',
                time: new Date().toISOString(),
                showTime: false
              };
            }
          } finally {
            state.isSending = false;
            scrollToBottom();
          }
        }

            if (fd.dataPoints) parts.push(`关键数据：${fd.dataPoints}`);
            if (fd.trend) parts.push(`整体趋势：${fd.trend}`);

        async function callDeepSeek(systemPrompt, userMessage) {
          const apiKey = localStorage.getItem(STORAGE_KEY_API);
          if (!apiKey) {
            state.showSettings = true;
            throw new Error('请先设置 API Key');
          }

          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 30000);

          try {
            const response = await fetch(DEEPSEEK_API_URL, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
              },
              body: JSON.stringify({
                model: DEEPSEEK_MODEL,
                messages: [
                  { role: 'system', content: systemPrompt },
                  { role: 'user', content: userMessage }
                ],
                temperature: 0.3,
                response_format: { type: 'json_object' }
              }),
              signal: controller.signal
            });

            clearTimeout(timeoutId);

            if (response.status === 401) {
              throw new Error('❌ API Key 无效，请前往设置更新');
            }
            if (response.status === 429) {
              throw new Error('⏱️ 请求过于频繁，请稍后重试');
            }
            if (!response.ok) {
              throw new Error(`请求失败 (${response.status})，请稍后重试`);
            }

            const data = await response.json();
            const content = data.choices?.[0]?.message?.content;
            if (!content) {
              throw new Error('AI 返回数据为空，请重试');
            }

            try {
              return JSON.parse(content);
            } catch (parseErr) {
              console.error('JSON 解析失败:', content);
              throw new Error('AI 返回格式异常，请重试');
            }
          } catch (err) {
            clearTimeout(timeoutId);
            if (err.name === 'AbortError') {
              throw new Error('⏱️ 请求超时，请检查网络后重试');
            }
            if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
              throw new Error('⏱️ 网络连接失败，请检查网络后重试');
            }
            throw err;
          }
        }

        function confirmClearHistory() {
          const folder = currentFolder.value;
          if (!folder || folder.history.length === 0) return;
          showConfirm(`确定清空「${folder.name}」文件夹的所有学习记录（词汇、翻译、作文）？此操作不可恢复。`, () => {
            folder.history = [];
            saveFolders();
            showToast('记录已清空');
            if (state.currentView === 'summary') {
              // 触发重新渲染
              state.currentView = 'chat';
              nextTick(() => { state.currentView = 'summary'; });
            }
          });
        }

        // ==================== 初始化 ====================
        function init() {
          migrateOldData();
          loadExamType();
          loadFolders();
          loadApiKey();
          document.title = examConfig.value.title;
          addWelcomeMessage();
          scrollToBottom();
        }

        onMounted(() => {
          init();
        });

        // ==================== 导出 ====================
        return {
          state,
          examConfig,
          currentModeConfig,
          inputPlaceholder,
          keywordGuideText,
          currentFolder,
          currentModeMessages,
          sortedVocabulary,
          sortedTranslations,
          sortedEssays,
          sortedEnToCn,
          sortedShortEssays,
          sortedLongEssays,
          // 方法
          handleSend,
          switchMode,
          switchExamType,
          submitEssayForm,
          toggleFolderDropdown,
          openNewFolderDialog,
          createFolder,
          switchFolder,
          confirmDeleteFolder,
          openSummary,
          queryFromSummary,
          queryTranslateFromSummary,
          queryEssayFromSummary,
          confirmClearHistory,
          deleteHistoryItem,
          saveApiKey,
          clearApiKeyConfirm,
          clearApiKey,
          testConnection,
          cancelConfirm,
          executeConfirm,
          formatTime,
          hasExtensionContent,
        };
      }
    }).mount('#app');
  </script>

</body>
</html>
